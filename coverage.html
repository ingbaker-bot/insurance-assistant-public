<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <div class="header-title">保障清單</div>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(160deg,#EEF4FF 0%,#F5F0FF 50%,#EFF9F4 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;min-height:100vh;color:#1a1a1a}
    .header{background:#fff;border-bottom:1px solid #eee;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
    .back-btn{background:none;border:none;font-size:26px;color:#999;cursor:pointer;padding:0}
    .header-title{font-size:18px;font-weight:500;flex:1}
    .save-btn{padding:6px 16px;background:#378ADD;color:#fff;border:none;border-radius:7px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit}
    .save-btn:disabled{background:#ccc}
    .member-tabs{display:flex;background:#fafafa;border-bottom:1px solid #eee;overflow-x:auto;padding:0 16px}
    .product-query-bar{display:none;align-items:center;gap:8px;padding:10px 16px;background:#F5F8FF;border-bottom:1px solid #EEF2FF;flex-wrap:wrap}
    .product-query-name{font-size:14px;color:#374151;font-weight:500;flex:1;min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .product-query-amount{font-size:14px;color:#3B82F6;font-weight:600;white-space:nowrap}
    .product-query-btn{font-size:13px;padding:6px 12px;border-radius:8px;border:1px solid #D6E0FF;background:#fff;color:#3B82F6;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
    .product-query-btn:hover{background:#EEF4FF}
    .product-query-btn.copied{background:#22C55E;color:#fff;border-color:#22C55E}
    .member-tab{padding:9px 14px;font-size:14px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;color:#888}
    .member-tab.active{border-bottom-color:#378ADD;color:#378ADD;font-weight:500}
    .main { 
  padding: 16px 24px; /* 電腦版左右留白稍微加大，視覺更舒適 */
  max-width: 1200px;  /* 將原本的 560px 放大，讓大螢幕可以滿版展開 */
  margin: 0 auto;
  width: 100%;        /* 確保絕對不會超出手機螢幕邊界 */
}

/* 針對手機版自動微調邊距，保持原本的緊湊感 */
@media (max-width: 768px) {
  .main { padding: 16px; }
}
    .stats-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .stat-pill{font-size:14px;padding:3px 10px;border-radius:99px;background:#E6F1FB;color:#0C447C}
    .group-block{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;margin-bottom:10px}
    .group-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none}
    .group-header-left{display:flex;align-items:center;gap:8px}
    .group-icon{font-size:19px}
    .group-title{font-size:17px;font-weight:500}
    .group-count{font-size:14px;padding:2px 7px;border-radius:99px;background:#f0f0f0;color:#888}
    .group-chevron{font-size:19px;color:#ccc;transition:transform 0.2s}
    .group-chevron.open{transform:rotate(90deg)}
    .group-body{padding:14px;border-top:1px solid #f0f0f0}
    /* 欄位 */
    .fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field-full{grid-column:1/-1}
    .field label{display:block;font-size:14px;color:#888;margin-bottom:4px}
    .input-unit{display:flex;align-items:center;border:1px solid #e0e0e0;border-radius:6px;overflow:hidden}
    .input-unit:focus-within{border-color:#378ADD}
    .input-unit input{flex:1;padding:7px 8px;font-size:17px;border:none;outline:none;font-family:inherit;min-width:0}
    .input-unit .unit{padding:0 7px;font-size:14px;color:#aaa;background:#fafafa;border-left:1px solid #f0f0f0;white-space:nowrap}
    .range-row{display:flex;align-items:center;gap:5px}
    .range-row input{flex:1;padding:7px 8px;font-size:17px;border:1px solid #e0e0e0;border-radius:6px;outline:none;font-family:inherit;min-width:0}
    .range-row input:focus{border-color:#378ADD}
    .range-sep{font-size:14px;color:#aaa;flex-shrink:0}
    .range-unit{font-size:14px;color:#aaa;flex-shrink:0}
    /* 快速選鈕 */
    .quick-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
    .qbtn{padding:3px 10px;font-size:14px;border-radius:99px;cursor:pointer;font-family:inherit;border:1.5px solid #ddd;background:#fff;color:#666;transition:all .1s}
    .qbtn.on-acc{border-color:#633806;background:#FAEEDA;color:#633806}
    .qbtn.on-hosp{border-color:#085041;background:#E1F5EE;color:#085041}
    .qbtn.on-daily{border-color:#0C447C;background:#E6F1FB;color:#0C447C}
    /* 分隔標題 */
    .sub-title{font-size:14px;font-weight:500;color:#378ADD;background:#E6F1FB;padding:4px 10px;border-radius:5px;margin:10px 0 8px;grid-column:1/-1}
    .sub-title.orange{color:#633806;background:#FAEEDA}
    .sub-title.green{color:#085041;background:#E1F5EE}
    .sub-title.blue{color:#0C447C;background:#E6F1FB}
    /* 類型選擇 */
    .type-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    /* 限制類型 */
    .limit-wrap{border:1px solid #e0e0e0;border-radius:8px;padding:10px;grid-column:1/-1}
    .limit-type-row{display:flex;gap:6px;margin-bottom:8px}
    /* 延長保障區塊 */
    .extend-block{border:1px solid #A8D5B5;border-radius:8px;padding:10px;grid-column:1/-1;background:#EAF3DE}
    .extend-title{font-size:14px;font-weight:500;color:#27500A;margin-bottom:8px}
    /* checkbox */
    .cb-row{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;grid-column:1/-1}
    .cb-row input{width:16px;height:16px;accent-color:#378ADD}
    .cb-row span{font-size:17px;color:#555}
    /* 說明文字 */
    .note{font-size:14px;color:#888;padding:5px 8px;background:#f7f7f5;border-radius:5px;grid-column:1/-1;line-height:1.5}
    .note.blue{background:#E6F1FB;color:#0C447C}
    .note.green{background:#E1F5EE;color:#085041}
    .saved-hint{font-size:14px;color:#27AE8F;text-align:center;padding:6px 0;display:none}
    .loading{text-align:center;padding:40px;color:#bbb;font-size:14px}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid #e0e0e0;border-top-color:#378ADD;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>

<script>
    // GAS_URL 已移至 nav.js 統一管理

// ── 群組定義 ──────────────────────────────────────────────
var GROUPS=[
  {key:"accident",label:"意外險",icon:"⚡",color:"#633806",bg:"#FAEEDA",type:"accident"},
  {key:"hospitalize",label:"住院醫療（實支實付）",icon:"🏥",color:"#085041",bg:"#E1F5EE",type:"hospitalize"},
  {key:"daily",label:"日額型住院",icon:"📅",color:"#0C447C",bg:"#E6F1FB",type:"daily"},
  {key:"surgery",label:"定額手術",icon:"🔪",color:"#3C3489",bg:"#EEEDFE",fields:[
    {key:"surg_opd",label:"門診手術醫療保險金",unit:"元",type:"range"},
    {key:"surg_special",label:"特定處置項目保險金",unit:"元",type:"range"},
    {key:"surg_hosp",label:"住院手術醫療保險金",unit:"元",type:"range"},
    // 👇 1. 修改：更名為「手術看護療養金」並加上 type:"range" 支援最高/最低區間輸入
    {key:"surg_nurse",label:"手術看護療養金",unit:"元",type:"range"},
    {key:"surg_limit",label:"保險給付限制",unit:"萬元"},
    // 👇 2. 新增：健康增值保險金，使用勾選框 (checkbox)
    {key:"health_bonus",label:"健康增值保險金 (無理賠回饋)",unit:"",type:"checkbox"},
  ]},
  {key:"cancer",label:"癌症醫療",icon:"🎗️",color:"#791F1F",bg:"#FCEBEB",fields:[
    {key:"can_low",label:"低侵襲性／特定癌症",unit:"元"},
    {key:"can_first",label:"初次罹患癌症（一次）",unit:"萬元"},
    {key:"can_surgery",label:"癌症手術醫療保險金",unit:"萬元/次"},
    {key:"can_hosp",label:"癌症住院醫療",unit:"元/日"},
    {key:"can_discharge",label:"出院療養",unit:"元/日"},
    {key:"can_opd",label:"癌症門診醫療",unit:"元/次"},
    {key:"can_proton",label:"癌症質子治療",unit:"萬元/次"},
    {key:"can_radiation",label:"放射線治療",unit:"元/日"},
    {key:"can_gene",label:"癌症基因檢測",unit:"萬元"},
    {key:"can_chemo",label:"化學治療",unit:"元/日"},
    {key:"can_target",label:"標靶藥物治療",unit:"萬元"},
    {key:"can_davinci",label:"達文西手術",unit:"萬元"},
    {key:"can_breast",label:"義乳重建手術",unit:"萬元"},
    {key:"can_immune",label:"自體免疫細胞治療",unit:"萬元"},
    {key:"can_marrow",label:"骨髓移植／幹細胞移植",unit:"萬元"},
    {key:"can_total",label:"癌症給付總限額",unit:"萬元"},
    {key:"can_hospice",label:"安寧照護",unit:"萬元"},
    {key:"can_death",label:"癌症身故",unit:"萬元"},
  ]},
  // 重大：涵蓋「重大疾病險／重大傷病險／特定傷病險」三種保單類別。
  // 這三者在實務保單設計上高度重疊，因此合併成一個分類頁籤。
  // 一次性給付分開三個欄位（重大疾病/重大傷病/特定傷病），因為同一張
  // 保單底下，不同認定條件對應的給付金額可能不一樣，不能只用單一數字
  // 代表。summary.html/export.html 的缺口分析會優先加總這三個欄位，
  // 如果都沒填才退回使用保單本身的「保額」欄位（相容沒有細分填寫的
  // 舊保單）。
  // ltc_life/ltc_yr/ltc_mo 沿用原本在「失能長照」分類的欄位 key 不變，
  // 只是改到這裡顯示，既有保單填過的資料完全不受影響、照樣讀得到。
  {key:"ci",label:"重大",icon:"🚨",color:"#9B59B6",bg:"#F3E8FA",fields:[
    {key:"ci_major_lump",label:"重大疾病一次金",unit:"萬元"},
    {key:"ci_catastrophic_lump",label:"重大傷病一次金",unit:"萬元"},
    {key:"ci_specific_lump",label:"特定傷病一次金",unit:"萬元"},
    {key:"ltc_life",label:"生活扶助金（每月）",unit:"萬元/月"},
    {key:"ltc_yr",label:"特定傷病保險金（每年）",unit:"萬元/年"},
    {key:"ltc_mo",label:"特定傷病保險金（每月）",unit:"萬元/月"},
  ]},
  {key:"ltc",label:"失能長照",icon:"🤝",color:"#27500A",bg:"#EAF3DE",fields:[
    {key:"ltc_care",label:"長照／長看關懷保險金",unit:"萬元"},
    {key:"ltc_monthly",label:"長期照護療養（每月）",unit:"萬元"},
    {key:"ltc_dis_amt",label:"失能（殘廢）保險金",unit:"萬元"},
    {key:"ltc_dis_life",label:"失能（殘廢）生活扶助金",unit:"萬元"},
    {key:"ltc_waiver",label:"保費豁免",unit:"",type:"checkbox"},
  ]},
];

var currentUser=null,familyData=null,familyFileName=null;
var personDataMap={},currentPersonId=null,currentPolicyId=null;
var openGroups={},dirty=false,viewMode="list";

// ── 初始化 ────────────────────────────────────────────────
window.addEventListener("nbs_nav_ready", async function(e) {
  currentUser       = e.detail.user;  // 賦值給全域變數
  familyData        = e.detail.familyData;
  currentPersonId   = e.detail.currentPersonId;
  familyFileName    = e.detail.familyFileName;

  if (!currentUser || !familyData) {
    document.getElementById("loading").innerHTML = "載入失敗：請重新登入";
    return;
  }

  try {
    // 效能優化：優先借用 nav.js（readFamilyBundle）已經抓好的成員資料，
    // 缺少的才補抓，不再每個成員都重複打一次 readFile。
    const activeMembers = familyData.members.filter(m => m.role !== "beneficiary_only");
    personDataMap = Object.assign({}, e.detail.personsData || {});

    const missingMembers = activeMembers.filter(m => !personDataMap[m.personId]);
    if (missingMembers.length) {
      const fetchPromises = missingMembers.map(m => {
        return callGAS("readFile", {
          email: currentUser.email,
          fileType: "persons",
          fileName: m.name + "_" + m.personId + ".json"
        }).then(pr => {
          if (pr.status === "ok") personDataMap[m.personId] = pr.content;
        }).catch(err => console.error("讀取 " + m.name + " 失敗", err));
      });
      await Promise.all(fetchPromises);
    }

    // SPA 底下，await 期間使用者可能已經切到別頁，DOM 已經被替換掉
    if (window.NBSRouter && !NBSRouter.isActive("coverage.html")) return;

    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";
    renderTabs();
    showListView();
  } catch(err) {
    if (window.NBSRouter && !NBSRouter.isActive("coverage.html")) { console.warn("[coverage] 已切換頁面，略過：", err); return; }
    console.error("coverage.html init error", err);
    document.getElementById("loading").innerHTML = "載入失敗：" + err.message;
  }
});

function renderTabs(){
  const members=familyData.members.filter(m=>m.role!=="beneficiary_only");
  document.getElementById("member-tabs").innerHTML=members.map(m=>
    `<div class="member-tab ${currentPersonId===m.personId?'active':''}" onclick="switchPerson('${m.personId}')">${m.name}</div>`
  ).join("");
}

function switchPerson(pid){
  if(dirty&&!confirm("有未儲存的變更，確定要切換？"))return;
  currentPersonId=pid;dirty=false;renderTabs();showListView();
}

// ── 保單列表頁 ────────────────────────────────────────────
function showListView(){
  viewMode="list";
  document.getElementById("loading").style.display="none";
  document.getElementById("content").style.display="block";
  document.getElementById("header-title")?.remove();
  document.getElementById("product-query-bar").style.display="none";
  // ▼ 拿掉「附約」二字
  document.querySelector(".header-title").textContent="";
  document.querySelector(".back-btn").onclick=goBack;

  const person=personDataMap[currentPersonId];
  // ▼ 關鍵修改：將「一般保單」與「儲蓄險」合併成一個陣列來顯示
  // 只取有效保單（排除舊版 person.savings 誤存的垃圾資料）
  const allPolicies = (person?.policies || []).filter(p => p.id && p.category);
  
  if(!allPolicies.length){
    document.getElementById("content").innerHTML='<div style="text-align:center;padding:40px;color:#bbb;font-size:14px">尚無保單，請先至「保險繳費」或「儲蓄險」頁面輸入保單資料</div>';
    return;
  }

  // 統計所有保單已填數
  let totalFilled=0,totalFields=0;
  allPolicies.forEach(p=>{
    const cov=p.coverage||{};
    GROUPS.forEach(g=>{
      const fields=g.fields||getGroupFields(g.type);
      fields.forEach(f=>{
        totalFields++;
        if(f.type==="range"){if(cov[f.key+"_min"]||cov[f.key+"_max"])totalFilled++;}
        else if(f.type==="checkbox"){if(cov[f.key])totalFilled++;}
        else if(f.key&&cov[f.key])totalFilled++;
      });
    });
  });
  document.getElementById("stats-row").innerHTML=`<span class="stat-pill" style="font-size:19px;font-weight:700;padding:6px 16px">全部保單已填 ${totalFilled} 項</span>`;

  // 排序：同一張保單號碼（同一張保單的主約+附約）放在一起，
  // 且群組內主約排在附約前面；不同保單號碼群組之間維持原本的相對順序
  const policyNoOrder = [];
  allPolicies.forEach(p => {
    const k = p.policyNo || p.id;
    if (!policyNoOrder.includes(k)) policyNoOrder.push(k);
  });
  const sortedPolicies = [...allPolicies].sort((a, b) => {
    const ka = a.policyNo || a.id, kb = b.policyNo || b.id;
    const oa = policyNoOrder.indexOf(ka), ob = policyNoOrder.indexOf(kb);
    if (oa !== ob) return oa - ob;
    return (a.isMain === true ? 0 : 1) - (b.isMain === true ? 0 : 1);
  });

  // 保單列表
  let html="";
  sortedPolicies.forEach(p=>{
    const cov=p.coverage||{};
    const filledCount=countFilled(cov);
    const hasCov=filledCount>0;
    html+=`<div onclick="openCoverageEdit('${p.id}')"
      style="background:rgba(255,255,255,.85);border:1px solid rgba(120,140,255,.12);border-left:4px solid ${hasCov?"#22C55E":"rgba(120,140,255,.20)"};border-radius:13px;padding:13px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(100,120,255,.05);transition:all .15s">
      <div style="flex:1;min-width:0;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        ${p.isMain===true
          ? '<span style="font-size:14px;color:#fff;background:#378ADD;padding:2px 8px;border-radius:99px;white-space:nowrap;font-weight:600">主</span>'
          : '<span style="font-size:14px;color:#888;background:#ebebeb;padding:2px 8px;border-radius:99px;white-space:nowrap;font-weight:600">附</span>'}
        <span style="font-size:17px;color:#9CA3AF;white-space:nowrap">${p.company||"—"}</span>
        <span style="font-size:14px;padding:2px 9px;border-radius:99px;background:#f0f0f0;color:#555;white-space:nowrap">${p.category||"儲蓄險"}</span>
        <span style="font-family:monospace;font-size:14px;background:#EEF4FF;color:#3B82F6;padding:2px 9px;border-radius:99px;white-space:nowrap">${p.policyNo||p.id}</span>
        <span style="font-size:17px;font-weight:700;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.itemName||"—"}</span>
        ${p.insuredAmount ? `<span style="font-size:15px;font-weight:600;color:#3B82F6;white-space:nowrap">保額 ${p.insuredAmount} ${p.insuredAmountUnit||"萬元"}</span>` : ""}
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span style="font-size:14px;padding:3px 10px;border-radius:99px;background:${hasCov?"#D1FAE5":"#F3F4F6"};color:${hasCov?"#065F46":"#9CA3AF"};font-weight:600;white-space:nowrap">${filledCount} 項已填</span>
        <span style="color:#D1D5DB;font-size:19px">›</span>
      </div>
    </div>`;
  });
  document.getElementById("content").innerHTML=html;
}

function countFilled(cov){
  let n=0;
  GROUPS.forEach(g=>{
    const fields=g.fields||getGroupFields(g.type);
    fields.forEach(f=>{
      if(f.type==="range"){if(cov[f.key+"_min"]||cov[f.key+"_max"])n++;}
      else if(f.type==="checkbox"){if(cov[f.key])n++;}
      else if(f.key&&cov[f.key])n++;
    });
  });
  return n;
}

// ── 附約編輯頁 ────────────────────────────────────────────
function copyItemName(){
  const name = document.getElementById("product-query-name").textContent;
  if(!name) return;
  const btn = document.getElementById("product-query-copy-btn");
  const done = () => {
    const original = "📋 複製商品名稱";
    btn.textContent = "✓ 已複製";
    btn.classList.add("copied");
    setTimeout(()=>{ btn.textContent = original; btn.classList.remove("copied"); }, 1500);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(name).then(done).catch(()=>fallbackCopy(name, done));
  } else {
    fallbackCopy(name, done);
  }
}

function fallbackCopy(text, done){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); done(); } catch(e) { alert("複製失敗，請手動選取文字複製"); }
  document.body.removeChild(ta);
}

function openCoverageEdit(policyId){
  currentPolicyId=policyId;viewMode="edit";openGroups={};
  const person=personDataMap[currentPersonId];
  const policy = person?.policies?.find(p=>p.id===policyId) ;
  if(!policy) return;
  if(!policy.coverage) policy.coverage={};
  document.querySelector(".header-title").textContent=policy.itemName||"附約保障";
  const qbar = document.getElementById("product-query-bar");
  document.getElementById("product-query-name").textContent = policy.itemName || "";
  const amtEl = document.getElementById("product-query-amount");
  amtEl.textContent = policy.insuredAmount
    ? `保額 ${policy.insuredAmount} ${policy.insuredAmountUnit||"萬元"}`
    : "";
  qbar.style.display = "flex";
  document.querySelector(".back-btn").onclick=()=>{
    if(dirty&&!confirm("有未儲存的變更，確定要返回？"))return;
    dirty=false;showListView();
  };
  renderEdit(policy);
}

function renderEdit(policy){
  const cov=policy.coverage||{};
  let html="";
  GROUPS.forEach(g=>{
    const filledCount=countGroupFilled(g,cov);
    const isOpen=openGroups[g.key];
    html+=`<div class="group-block">
      <div class="group-header" onclick="toggleGroup('${policy.id}','${g.key}')" style="background:${isOpen?g.bg:"#fff"}">
        <div class="group-header-left">
          <span class="group-icon">${g.icon}</span>
          <span class="group-title" style="color:${g.color}">${g.label}</span>
          <span class="group-count">${filledCount} 已填</span>
        </div>
        <span class="group-chevron ${isOpen?"open":""}">›</span>
      </div>
      ${isOpen?renderGroupBody(g,cov,policy.id):""}
    </div>`;
  });
  document.getElementById("loading").style.display="none";
  document.getElementById("content").style.display="block";
  document.getElementById("content").innerHTML=html;
}

function countGroupFilled(g,cov){
  const fields=g.fields||getGroupFields(g.type);
  return fields.filter(f=>{
    if(f.type==="range") return cov[f.key+"_min"]||cov[f.key+"_max"];
    if(f.type==="checkbox") return cov[f.key];
    if(f.key) return cov[f.key];
    return false;
  }).length;
}

function toggleGroup(policyId,key){
  collectValues();
  openGroups[key]=!openGroups[key];
  const person=personDataMap[currentPersonId];
  const policy = person?.policies?.find(p=>p.id===policyId) ;
  if(policy) renderEdit(policy);
}

// ── 快速設值 ──────────────────────────────────────────────
function setVal(key,val,policyId){
  const person=personDataMap[currentPersonId];
  if(!person) return;
  const policy = person?.policies?.find(p=>p.id===policyId) ;
  if(!policy) return;
  if(!policy.coverage) policy.coverage={};
  policy.coverage[key]=isNaN(val)?val:Number(val);
  dirty=true;
  renderEdit(policy);
}

function markDirty(){ dirty=true; }

// ── 收集所有輸入值 ────────────────────────────────────────
function collectValues(){
  const person=personDataMap[currentPersonId];
  if(!person||!currentPolicyId) return;
  const policy = person?.policies?.find(p=>p.id===currentPolicyId) ;
  if(!policy) return;
  if(!policy.coverage) policy.coverage={};
  const cov=policy.coverage;

  // 收集所有 input/select
  document.querySelectorAll("[id^='cov_']").forEach(el=>{
    const key=el.id.replace("cov_","");
    if(el.type==="checkbox") cov[key]=el.checked;
    else {
      // ▼ 修正：如果使用者把欄位清空，就確實把該筆資料刪除
      if (el.value === "") {
        delete cov[key];
      } else {
        const v=parseFloat(el.value);
        cov[key]=isNaN(v)?el.value:v;
      }
    }
  });
}

// ── 儲存 ─────────────────────────────────────────────────
async function saveCoverage(isAutoSave = false) { 
  collectValues();
  
  const btn = document.getElementById("save-btn");
  if(btn && !isAutoSave) {
    btn.disabled = true;
    btn.textContent = "儲存中…";
  }

  const person = personDataMap[currentPersonId];
  if(!person) return;
  
  person.updatedAt = new Date().toISOString();
  const member = familyData.members.find(m => m.personId === currentPersonId);

  try {
    await callGAS("saveFile", {
      email: currentUser.email,
      fileType: "persons",
      fileId: currentPersonId,
      fileName: member.name + "_" + currentPersonId + ".json",
      content: person
    });

    // ▼ 關鍵修復：每次存檔後，強制清除瀏覽器的舊暫存！
    // 這樣切換到保單彙總時，系統就會重新去雲端抓最新資料
    sessionStorage.clear(); 

    dirty = false;
    const hint = document.getElementById("saved-hint");
    if (hint) {
      hint.style.display = "block";
      setTimeout(() => hint.style.display = "none", 2000);
    }

    if (!isAutoSave) {
      if (viewMode === "edit") {
        const policy = person?.policies?.find(p=>p.id===currentPolicyId) ;
        if (policy) renderEdit(policy);
      }
    }
  } catch(e) { 
    alert("儲存失敗：" + e.message); 
  } finally { 
    if(btn) {
      btn.disabled = false; 
      btn.textContent = "儲存"; 
      btn.style.backgroundColor = ""; 
    }
  }
}function goBack() {
  // 如果自動儲存的計時器還在跑（代表有剛剛輸入但還沒存的資料）
  if (autoSaveTimer) {
    clearTimeout(autoSaveTimer); // 停下計時器
    saveCoverage();              // 強制立刻存檔
  }
  
  // 原本的返回邏輯
  if(dirty && !confirm("有未儲存的變更，確定要離開？")) return;
  window.location.href = "family.html";
}

function callGAS(action, params) {
  // 統一路由到 nav.js 的 NBS_NAV.callGAS（直連 Drive API，含 OAuth token）
  if (window.NBS_NAV && typeof NBS_NAV.callGAS === 'function') {
    return NBS_NAV.callGAS(action, params);
  }
  return Promise.reject(new Error('nav.js 未載入，請重新整理頁面'));
}


// ── NBS 導覽 ──────────────────────────────────────────────
NBS_NAV.onMemberChange = function(pid) {
  currentPersonId = pid;
  if (typeof renderContent  === "function") renderContent();
  if (typeof showListView   === "function") showListView();
  if (typeof renderContent  === "function") renderContent();
};

// 支援兩種事件：nav.js 自行載入 或 family.html 先載入後通知
window.addEventListener("nbs_family_loaded", function(e) {
  if (typeof familyData !== "undefined" && familyData) return; // 已初始化
  var u = JSON.parse(localStorage.getItem("nbs_user") || "{}");
  window.dispatchEvent(new CustomEvent("nbs_nav_ready", {
    detail: {
      user:            u,
      familyData:      e.detail.familyData,
      currentPersonId: e.detail.familyData && e.detail.familyData.members &&
                       e.detail.familyData.members[0] && e.detail.familyData.members[0].personId,
      familyFileName:  e.detail.familyFileName
    }
  }));
});
NBS_NAV.init({ page: "coverage" });

// ── 自動儲存 (防抖 Debounce) 邏輯 ─────────────────────────
// ── 自動儲存 (防抖 Debounce) 邏輯 ─────────────────────────
var autoSaveTimer = null;

document.addEventListener('input', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') {
    
    const btn = document.getElementById("save-btn");
    if(btn) {
      btn.textContent = "待儲存...";
      btn.style.backgroundColor = "#f39c12"; 
      btn.style.color = "#fff";
    }

    clearTimeout(autoSaveTimer);

    autoSaveTimer = setTimeout(function() {
      // 【修復關鍵 1】強制觸發 change 事件，確保游標還沒離開前，輸入的 1000 已寫入系統變數
      if (document.activeElement && document.activeElement.tagName === 'INPUT') {
          document.activeElement.dispatchEvent(new Event('change'));
      }

      if(btn) {
        btn.textContent = "自動儲存中...";
        btn.style.backgroundColor = "#e67e22"; 
      }
      
      // 傳入 true，告訴系統這是一次「背景自動儲存」
      saveCoverage(true); 
      
    }, 2000); 
  }
});
</script>
