    .pie-dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }

    .coverage-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 24px; }

// ── 輔助加總計算機 ─────────────────────────────────────────
// 保額單位換算成「萬元」。policy.html 的保額單位選項除了「萬元」「元」
// 這兩種可以換算的貨幣單位，還有「計劃/型/份/自訂」這類非金額單位
// （例如投資型保單常用「型」），這些無法換算成金額，回傳 null，
// 呼叫端應該把這種情況當作「金額不明」處理，不要當成 0 或亂算。
// 判斷保單目前是否仍在保障中：只有「停效」才算失去保障，
// 其餘狀態（有效/繳費期滿/自動墊繳/展期/緩繳/減額繳清）都代表保單
// 仍在繼續提供保障，都應該算進保障覆蓋率計算裡。
function isPolicyActive(p) {
  return p.status !== "停效";
}

function convertToWan(amount, unit) {
  const n = parseFloat(amount);
  if (isNaN(n)) return null;
  const u = unit || "萬元";
  if (u === "萬元") return n;
  if (u === "元") return n / 10000;
  return null; // 計劃/型/份/自訂等非金額單位，無法換算
}

function sumCov(keys, policies, coverage) {
  let total = 0;
  policies.forEach(p => {
    keys.forEach(k => {
      if (p.coverage && typeof p.coverage[k] === "number") {
        total += p.coverage[k];
      }
    });
  });
  // 相容舊格式
  if (total === 0 && coverage) {
      policies.forEach(p => {
          keys.forEach(k => {
              if (coverage[p.id + "_" + k] && typeof coverage[p.id + "_" + k] === "number") {
                  total += coverage[p.id + "_" + k];
              }
          });
      });
  }
  return total;
}

// 核心運算引擎：精準抓取資料庫數字
function getItemCurrent(key, policies, coverage, covOverrides) {
  const map = GAP_KEY_MAP[key];
  if(!map) return 0;

  const manualKey = currentPersonId+"_"+key;
  if(covOverrides && covOverrides[manualKey] !== undefined) {
    return covOverrides[manualKey] ? 1 : 0;
  }

  if(["investment","savings","waiver"].includes(key)) {
    if(key==="investment") return policies.some(p=>p.category==="投資型保險")?1:0;
    if(key==="savings")    return policies.some(p=>["儲蓄險","年金險"].includes(p.category))?1:0;
    if(key==="waiver")     return sumCov(["ltc_waiver"], policies, coverage) > 0 ? 1 : 0;
    return 0;
  }

  if (["life_permanent", "life_term"].includes(key)) {
      let amt = 0;
      const matchedPolicies = policies.filter(p => map.cats.includes(p.category));
      matchedPolicies.forEach(p => {
         const w = convertToWan(p.insuredAmount, p.insuredAmountUnit);
         if (w !== null) amt += w;
      });
      if (amt === 0 && matchedPolicies.length > 0) return 1; 
      return amt;
  }

  if (key === "ci_special") {
      const matchedPolicies = policies.filter(p => map.cats.includes(p.category));
      // 優先加總 coverage.html「重大」分類填的三個一次金欄位
      let amt = sumCov(["ci_major_lump","ci_catastrophic_lump","ci_specific_lump"], matchedPolicies, coverage);
      if (amt === 0) {
        // 都沒填，退回用保單保額（相容還沒細分填寫的舊保單），含單位換算
        matchedPolicies.forEach(p => {
           const w = convertToWan(p.insuredAmount, p.insuredAmountUnit);
           if (w !== null) amt += w;
        });
      }
      if (amt === 0 && matchedPolicies.length > 0) return 1; 
      return amt;
  }

  // 這些 key 是明細欄位，沒有填就應該是 0，不應該用保額填充
  const NO_FALLBACK_KEYS = [
    "acc_medical", "acc_hosp", "hosp_real_room", "hosp_daily",
    "surgery", "cancer_hosp", "cancer_surgery", "ltc_disable", "ltc_support",
    "ltc_care", "cancer_death_hospice"
  ];
  if (NO_FALLBACK_KEYS.includes(key)) {
    return sumCov(map.keys, policies, coverage);
  }

  let amt = sumCov(map.keys, policies, coverage);

  const matchedPolicies = policies.filter(p => map.cats.includes(p.category));
  if (amt === 0 && matchedPolicies.length > 0) {
      matchedPolicies.forEach(p => {
          const w = convertToWan(p.insuredAmount, p.insuredAmountUnit);
          if (w !== null) amt += w;
      });
      if (amt === 0) return 1; 
  }

  return amt;
}

function getItemStatus(key, policies, coverage, targets, covOverrides) {
  const item = GAP_GROUPS.flatMap(g=>g.items).find(i=>i.key===key);
  const current = getItemCurrent(key, policies, coverage, covOverrides);
  const target  = targets[key];
  const isBool  = item?.isBool;
  if(!current) return {status:"gap", current:0, target, pct:0};
  if(!target||isBool) return {status:"ok", current, target:null, pct:1};
  if(current>=target) return {status:"ok", current, target, pct:1};
  return {status:"insufficient", current, target, pct:current/target};
}

async function initPage(detail) {
  currentUser       = detail.user;
  familyData        = detail.familyData;
  currentPersonId   = detail.currentPersonId;
  familyFileName    = detail.familyFileName;

  if (!currentUser || !familyData) {
    document.getElementById("loading").innerHTML = "載入失敗：請重新登入";
    return;
  }

  try {
    const activeMembers = familyData.members.filter(m => m.role !== "beneficiary_only");
    
    const fetchPromises = activeMembers.map(m => {
      const cacheKey = "nbs_person_" + m.personId;
      const cachedData = sessionStorage.getItem(cacheKey);

      if (cachedData) {
        personDataMap[m.personId] = JSON.parse(cachedData);
        return Promise.resolve();
      } else {
        return callGAS("readFile", {
          email: currentUser.email,
          fileType: "persons",
          fileName: m.name + "_" + m.personId + ".json"
        }).then(pr => {
          if (pr.status === "ok") {
            personDataMap[m.personId] = pr.content;
            sessionStorage.setItem(cacheKey, JSON.stringify(pr.content));
          }
        }).catch(err => console.error("讀取 " + m.name + " 失敗", err));
      }
    });

    await Promise.all(fetchPromises);
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";
    renderTabs();
    renderContent();
  } catch(err) {
    console.error("summary.html init error", err);
    document.getElementById("loading").innerHTML = "載入失敗：" + err.message;
  }
}

function renderTabs() {
  const members = familyData.members.filter(m=>m.role!=="beneficiary_only");
  document.getElementById("member-tabs").innerHTML = members.map(m=>`
    <div class="member-tab ${currentPersonId===m.personId?'active':''}" onclick="switchPerson('${m.personId}')">
      ${m.name}${getInsAge(m.personId)!==null?' '+getInsAge(m.personId)+'歲':''}
    </div>`).join("");
}

function getInsAge(pid) {
  const p=personDataMap[pid];
  if(!p) return null;
  const b=new Date(p.profile.birthDate), a=new Date(p.profile.analysisDate||new Date());
  let y=a.getFullYear()-b.getFullYear();
  const mo=(a-new Date(b.getFullYear()+y,b.getMonth(),b.getDate()))/(1000*60*60*24*30.4375);
  if(mo>=6)y++;
  return y;
}

function switchPerson(pid) {
  currentPersonId=pid;

  renderContent();

  const cx=220, cy=150, OR=100, IR=54;
  const gapA=0.03, sliceA=(Math.PI*2-n*gapA)/n;

  let angle=-Math.PI/2;
  let paths="";
  let labels=""; 

  function renderLegend(g) {
    let legendHtml = `<div style="font-size:17px;font-weight:500;color:${g.color};margin-bottom:8px;border-bottom:1px solid ${g.color}30;padding-bottom:4px">${g.label}</div>`;

      const icon = status==="gap"?"❌":status==="insufficient"?"⚠️":"✅";

          if (target > 0) displayVal += ` / ${target.toLocaleString()}`;
          
          amtHtml = `<span style="color:${current>0?'#0C447C':'#888'};font-family:monospace;font-weight:600;font-size:16px">${displayVal}<span style="font-size:14px;color:#888;margin-left:3px;font-family:sans-serif">${item.unit}</span></span>`;
        } else {
          amtHtml = `<span style="color:#bbb;font-size:14px">0</span>`;
        }
      }

      legendHtml += `<div style="display:flex;align-items:center;gap:6px;font-size:14px;margin-bottom:5px">
        <div style="width:10px;height:10px;border-radius:2px;background:${dotColor};flex-shrink:0"></div>
        <span style="color:${status==="gap"?"#bbb":"#444"};flex:1;white-space:nowrap">${item.label}</span>
        ${amtHtml}
        <span style="margin-left:4px">${icon}</span>
      </div>`;
    });
    return legendHtml;
  }

  const legendFamily = renderLegend(GAP_GROUPS[0]);
  const legendBefore = renderLegend(GAP_GROUPS[1]);
  const legendDuring = renderLegend(GAP_GROUPS[2]);
  const legendAfter  = renderLegend(GAP_GROUPS[3]);

  allItems.forEach(item => {
    const {status,pct} = getItemStatus(item.key, active, coverage, targets, covOverrides);
    const start = angle+gapA/2;
    const end   = angle+gapA/2+sliceA;
    const filledEnd = start + sliceA*pct;
    const midA  = start + sliceA/2; 
    angle += sliceA+gapA;

    const px=(r,a)=>cx+r*Math.cos(a), py=(r,a)=>cy+r*Math.sin(a);
    const donut=(a1,a2,lg,r1,r2)=>`M${px(r1,a1)},${py(r1,a1)} A${r1},${r1} 0 ${lg} 1 ${px(r1,a2)},${py(r1,a2)} L${px(r2,a2)},${py(r2,a2)} A${r2},${r2} 0 ${lg} 0 ${px(r2,a1)},${py(r2,a1)} Z`;

    paths += `<path d="${donut(start,end,sliceA>Math.PI?1:0,OR,IR)}" fill="#f0f0f0"/>`;
    if(pct>0.01) paths += `<path d="${donut(start,filledEnd,sliceA*pct>Math.PI?1:0,OR,IR)}" fill="${item.color}"/>`;
    if(status==="insufficient" && pct<0.99) {
      const gapSize=sliceA*(1-pct);
      paths += `<path d="${donut(filledEnd,end,gapSize>Math.PI?1:0,OR,IR)}" fill="none" stroke="${item.color}" stroke-width="2.5" stroke-dasharray="4 3" opacity="0.45"/>`;
    }

    const isRight = Math.cos(midA) >= 0; 
    const x0 = px(OR, midA), y0 = py(OR, midA); 
    const x1 = px(OR + 14, midA), y1 = py(OR + 14, midA); 
    const x2 = x1 + (isRight ? 18 : -18), y2 = y1; 

    const textAnchor = isRight ? "start" : "end";
    const textX = x2 + (isRight ? 4 : -4);
    const textColor = status === "gap" ? "#aaa" : "#555";
    const fw = status === "ok" ? "500" : "400";
    const prefix = status === "gap" ? "❌ " : status === "insufficient" ? "⚠️ " : "";

    labels += `
      <polyline points="${x0},${y0} ${x1},${y1} ${x2},${y2}" fill="none" stroke="${item.color}60" stroke-width="1.2"/>
      <circle cx="${x0}" cy="${y0}" r="2" fill="${item.color}"/>
      <text x="${textX}" y="${y2+4}" text-anchor="${textAnchor}" style="font-size:14px;fill:${textColor};font-weight:${fw};letter-spacing:0.03em">${prefix}${item.label}</text>
    `;
  });

  const okN = allItems.filter(item=>getItemStatus(item.key,active,coverage,targets,covOverrides).status==="ok").length;
  const gapN = allItems.filter(item=>getItemStatus(item.key,active,coverage,targets,covOverrides).status==="gap").length;
  const insN = allItems.filter(item=>getItemStatus(item.key,active,coverage,targets,covOverrides).status==="insufficient").length;

  return `<div style="display:flex;flex-direction:column;width:100%">
    <div style="display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:20px;padding:0">
      <svg viewBox="0 0 440 300" style="width:100%; max-width:480px; flex-shrink:0;">
        ${paths}
        ${labels}
        <text x="${cx}" y="${cy-16}" text-anchor="middle" style="font-size:14px;fill:#888">✅ 達標</text>
        <text x="${cx}" y="${cy+6}"  text-anchor="middle" style="font-size:19px;font-weight:bold;fill:#333">${okN}</text>
        <text x="${cx}" y="${cy+24}" text-anchor="middle" style="font-size:14px;fill:#E74C3C">❌ 缺口 ${gapN}</text>
        <text x="${cx}" y="${cy+40}" text-anchor="middle" style="font-size:14px;fill:#F5A623">⚠ 不足 ${insN}</text>
      </svg>
      <div style="min-width:170px;background:#fafafa;padding:12px 16px;border-radius:10px;border:1px solid #f0f0f0">
        ${legendFamily}
      </div>
    </div>
    
    <div style="border-top:1px dashed #e8e8e8;padding-top:20px">
      <!-- 箭頭指標列 -->
      <div style="display:flex;align-items:stretch;margin-bottom:16px;font-size:17px;font-weight:600;letter-spacing:0.05em;height:46px">
        <!-- 醫療前期 -->
        <div style="
          flex:1;
          display:flex;align-items:center;justify-content:center;
          background:#4CAF86;
          color:#fff;
          position:relative;
          clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%);
          padding-right:14px;
        ">醫療前期</div>
        <!-- 醫療中期 -->
        <div style="
          flex:1.4;
          display:flex;align-items:center;justify-content:center;
          background:#378ADD;
          color:#fff;
          position:relative;
          clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%);
          margin-left:-1px;
          padding: 0 14px;
        ">醫療中期</div>
        <!-- 醫療後期 -->
        <div style="
          flex:1;
          display:flex;align-items:center;justify-content:center;
          background:#E87BAD;
          color:#fff;
          position:relative;
          clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 14px 50%);
          margin-left:-1px;
          padding-left:14px;
        ">醫療後期</div>
      </div>
      <!-- 圖例內容 -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(130px, 1fr));gap:16px">
        <div>${legendBefore}</div>
        <div>${legendDuring}</div>
        <div>${legendAfter}</div>
      </div>
    </div>
  </div>`;
}

// ── 缺口／不足分析 ────────────────────────────────────────
function buildGapAnalysis(active, coverage, targets, covOverrides) {
  const allItems = GAP_GROUPS.flatMap(g=>g.items);
  const gaps = [], insufficients = [];
  allItems.forEach(item => {
    const s = getItemStatus(item.key, active, coverage, targets, covOverrides);
    if(s.status==="gap") gaps.push({item, ...s});
    if(s.status==="insufficient") insufficients.push({item, ...s});
  });

  let html = "";

  if(insufficients.length) {
    html += `<div style="font-size:17px;font-weight:500;color:#F5A623;margin-bottom:8px">⚠ 規劃不足</div>`;
    insufficients.forEach(({item,current,target,pct}) => {
      html += `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px;flex-wrap:wrap;gap:4px">
          <span style="font-size:16px;color:#555">${item.label}</span>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:17px;color:#555;font-weight:500">${current.toLocaleString()}${item.unit}</span>
            <span style="font-size:14px;color:#aaa">/ 目標 ${target?.toLocaleString()}${item.unit}</span>
          </div>
        </div>
        <div style="height:7px;background:#f0f0f0;border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${Math.round(pct*100)}%;background:${item.color};border-radius:99px"></div>
        </div>
        <div style="font-size:14px;color:#E74C3C;margin-top:3px">尚不足 ${(target-current).toLocaleString()}${item.unit}（${Math.round(pct*100)}% 達成）</div>
      </div>`;
    });
  }

  if(gaps.length) {
    html += `<div style="font-size:17px;font-weight:500;color:#E74C3C;margin-bottom:8px;margin-top:${insufficients.length?12:0}px">❌ 尚未規劃</div>`;
    html += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">`;
    gaps.forEach(({item}) => {
      html += `<span style="padding:4px 12px;background:#FCEBEB;border:1px solid #F0A8BF;border-radius:99px;font-size:14px;color:#791F1F">${item.label}</span>`;
    });
    html += `</div><div style="font-size:14px;color:#aaa">💡 可與保戶討論是否有需要規劃</div>`;
  }

  if(!insufficients.length && !gaps.length) {
    html += `<div style="font-size:17px;color:#27AE8F;text-align:center;padding:12px 0">🎉 所有已設目標項目均達標！</div>`;
  }

  html += `<button onclick="openTargetModal()" style="width:100%;margin-top:10px;padding:8px;background:transparent;border:1px dashed #ddd;border-radius:8px;font-size:16px;color:#666;cursor:pointer;font-family:inherit">🎯 設定 / 修改目標保額</button>`;
  return html;
}

// ── 目標設定 Modal ────────────────────────────────────────
function openTargetModal() {
  const person = personDataMap[currentPersonId];
  const policies = person?.policies||[];
  const active = policies.filter(isPolicyActive);

  const coverage = {};
  Object.entries(person?.coverage||{}).forEach(([k,v])=>{
    if(typeof v==="number") coverage[k]=(coverage[k]||0)+v;
    else coverage[k]=v;
  });
  policies.forEach(p => {
    Object.entries(p.coverage||{}).forEach(([k,v]) => {
      if(typeof v === "number") coverage[k] = (coverage[k]||0)+v;
      else coverage[k] = v;
    });
  });

  let bodyHtml = `<div style="font-size:14px;color:#888;background:#f7f7f5;padding:8px 12px;border-radius:8px;margin-bottom:14px;line-height:1.6">
    設定後顯示「不足」；未設定的項目只顯示「有/無（缺口）」，不計算差額。
  </div>`;

  GAP_GROUPS.forEach(g => {
    bodyHtml += `<div style="font-size:17px;font-weight:500;color:${g.color};padding:4px 10px;background:${g.color}15;border-radius:5px;margin-bottom:8px">${g.label}</div>`;
    g.items.filter(item=>!item.isBool).forEach(item => {
      const current = getItemCurrent(item.key, active, coverage, overrides);
      const tval = targets[item.key]||"";
      bodyHtml += `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px;flex-wrap:wrap;gap:4px">
          <label style="font-size:16px;color:#333">${item.label}</label>
          <span style="font-size:14px;color:#aaa">目前：${current.toLocaleString()||0} ${item.unit}</span>
        </div>
        <div style="display:flex;align-items:center;border:1px solid #e0e0e0;border-radius:7px;overflow:hidden">
          <input type="number" id="target_${item.key}" value="${tval}" placeholder="不設定（只顯示有/無）"
            style="flex:1;padding:10px 12px;font-size:17px;border:none;outline:none;font-family:inherit"/>
          ${item.unit?`<span style="padding:0 10px;font-size:14px;color:#aaa;background:#fafafa;border-left:1px solid #f0f0f0">${item.unit}</span>`:""}
        </div>
      </div>`;
    });
    bodyHtml += `<div style="margin-bottom:14px"></div>`;
  });

  const existing = document.getElementById("target-modal-overlay");
  if(existing) existing.remove();

  const overlay = document.createElement("div");
  overlay.id = "target-modal-overlay";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:flex;align-items:flex-end;justify-content:center";
  overlay.innerHTML = `<div style="background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;margin-bottom:14px">
      <span style="font-weight:600;font-size:19px">🎯 設定目標保額</span>
      <button onclick="document.getElementById('target-modal-overlay')?.remove()" style="background:none;border:none;font-size:26px;color:#999;cursor:pointer;line-height:1">×</button>
    </div>
    ${bodyHtml}
    <div style="display:flex;gap:8px;margin-top:8px">
      <button onclick="document.getElementById('target-modal-overlay')?.remove()"
        style="flex:1;padding:10px;background:transparent;color:#666;border:1px solid #ddd;border-radius:8px;cursor:pointer;font-family:inherit;font-size:16px">取消</button>
      <button onclick="saveTargets()"
        style="flex:2;padding:10px;background:#378ADD;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit">儲存目標</button>
    </div>
  </div>`;
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

function saveTargets() {
  GAP_GROUPS.flatMap(g=>g.items.filter(i=>!i.isBool)).forEach(item => {
    const el = document.getElementById("target_"+item.key);
    if(el) {
      const v = parseFloat(el.value);
      if(!isNaN(v) && v > 0) targets[item.key] = v;
      else delete targets[item.key];
    }
  });
  document.getElementById("target-modal-overlay")?.remove();
  renderContent();
}

function openModal() {
  const person  = personDataMap[currentPersonId];
  const policies= person?.policies||[];
  const coverage= person?.coverage||{};
  const active  = policies.filter(isPolicyActive);
  const covTypes= COVERAGE_TYPES.map(t=>{
    const auto=t.detect(active,coverage);
    const manual=overrides[currentPersonId+"_"+t.key];
    return {...t,covered:manual!==undefined?manual:auto,autoDetected:auto,isManual:manual!==undefined};
  });

  const groups=["壽險","意外","醫療","重大","癌症","長照","財務"];
  let html="";
  groups.forEach(g=>{
    const gTypes=covTypes.filter(t=>t.group===g);
    const gc=GROUP_COLORS[g];
    html+=`<div class="type-group-label" style="color:${gc}">${g}</div><div class="type-tags">`;
    gTypes.forEach(t=>{
      html+=`<div class="type-tag" id="tag_${t.key}" onclick="toggleOverride('${t.key}')"
        style="background:${t.covered?t.color+'18':'#f5f5f5'};border:1.5px ${t.covered?'solid':'dashed'} ${t.covered?t.color:'#ddd'}">
        <div class="type-tag-dot" style="background:${t.covered?t.color:'transparent'};border:${t.covered?'none':'1.5px solid #ccc'}"></div>
        <span class="type-tag-label" style="color:${t.covered?'#333':'#bbb'};font-weight:${t.covered?500:400}">${t.label}</span>
        ${t.isManual?'<span class="manual-badge">手動</span>':''}
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById("modal-types").innerHTML=html;
  document.getElementById("edit-modal").classList.add("active");
}

function toggleOverride(key) {
  const fk=currentPersonId+"_"+key;
  const person=personDataMap[currentPersonId];
  const active=(person?.policies||[]).filter(isPolicyActive);
  const cov=person?.coverage||{};
  const t=COVERAGE_TYPES.find(x=>x.key===key);
  const auto=t?t.detect(active,cov):false;
  const cur=overrides[fk];
  if(cur===undefined) overrides[fk]=!auto;
  else delete overrides[fk];
  openModal();
}
function closeModal() { document.getElementById("edit-modal").classList.remove("active"); renderContent(); }
function handleModalOverlay(e) { if(e.target===document.getElementById("edit-modal")) closeModal(); }

function goBack() { window.location.href="family.html"; }

function callGAS(action, params) {
  // 統一路由到 nav.js 的 NBS_NAV.callGAS（直連 Drive API，含 OAuth token）
  if (window.NBS_NAV && typeof NBS_NAV.callGAS === 'function') {
    return NBS_NAV.callGAS(action, params);
  }
  return Promise.reject(new Error('nav.js 未載入，請重新整理頁面'));
}

NBS_NAV.onMemberChange = function(pid) {
  currentPersonId = pid;
  if (typeof renderContent  === "function") renderContent();
};
NBS_NAV.init({ page: "summary" });

</script>
