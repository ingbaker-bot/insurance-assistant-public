<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="data:,">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NBS - 匯出圖片</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{
      --primary:#6366f1; --primary-dark:#4f46e5; --primary-light:#eef2ff;
      --accent-pdf:#f43f5e; --accent-pdf-light:#fff1f2;
      --bg:#f8fafc; --surface:#ffffff; --text:#1e293b; --text-muted:#64748b;
      --border:#e2e8f0; --success:#10b981; --success-light:#ecfdf5;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'PingFang TC',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);min-height:100vh;color:var(--text);padding-bottom:96px}
    .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
    .back{background:none;border:none;font-size:26px;color:var(--text-muted);cursor:pointer;padding:0}
    .hdr-title{font-size:18px;font-weight:700;flex:1}
    .hdr-sub{font-size:14px;color:var(--text-muted)}
    .member-tabs{display:flex;gap:8px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;padding:14px 16px}
    .member-tab{padding:8px 18px;border-radius:99px;background:#f1f5f9;cursor:pointer;white-space:nowrap;color:var(--text-muted);font-weight:600;font-size:14px;transition:.2s}
    .member-tab.active{background:var(--primary);color:#fff;box-shadow:0 4px 10px -2px rgba(99,102,241,.5)}
    /* 選項頁保持窄版（手機友好），預覽頁用獨立 class */
    .wrap{padding:20px;max-width:560px;margin:0 auto}
    .wrap-preview{padding:20px;max-width:1200px;margin:0 auto}
    .sec-lbl{font-size:14px;font-weight:700;color:var(--text-muted);margin-bottom:12px;letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between}
    .blk{display:flex;align-items:center;gap:14px;padding:16px 18px;border:2px solid transparent;border-radius:20px;cursor:pointer;background:var(--surface);margin-bottom:12px;box-shadow:0 4px 6px -1px rgba(0,0,0,.06);-webkit-tap-highlight-color:rgba(0,0,0,0);transition:.15s}
    .blk.on{border-color:var(--primary);background:var(--primary-light)}
    .chk{width:24px;height:24px;border-radius:8px;border:1.5px solid #d8dce6;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:#fff;background:#fff;transition:.15s}
    .blk.on .chk{background:var(--primary);border-color:var(--primary)}
    .blk-lbl{font-size:17px;font-weight:700;color:var(--text)}
    .blk.on .blk-lbl{color:var(--primary-dark)}
    .blk-desc{font-size:13px;color:var(--text-muted);margin-top:2px}
    .fmt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
    .fmt{padding:14px 14px;border:2px solid transparent;border-radius:16px;cursor:pointer;background:var(--surface);box-shadow:0 4px 6px -1px rgba(0,0,0,.06);-webkit-tap-highlight-color:rgba(0,0,0,0);transition:.15s}
    .fmt.spng{border-color:var(--primary);background:var(--primary-light)}
    .fmt.spdf{border-color:var(--accent-pdf);background:var(--accent-pdf-light)}
    .fmt-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px}
    .fmt.spng .fmt-title{color:var(--primary-dark)}
    .fmt.spdf .fmt-title{color:var(--accent-pdf)}
    .fmt-desc{font-size:13px;color:var(--text-muted);line-height:1.5}
    .fmt-section-hdr{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:var(--text);margin-top:18px;padding:10px 6px;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,0);border-radius:10px}
    .fmt-section-hdr:hover{background:#eef1f6}
    .fmt-hdr-sel{font-size:13px;font-weight:700;padding:3px 12px;border-radius:99px;background:var(--primary-light);color:var(--primary-dark);white-space:nowrap}
    .fmt-section-hdr.is-pdf .fmt-hdr-sel{background:var(--accent-pdf-light);color:var(--accent-pdf)}
    .fmt-chevron{font-size:14px;color:#bbb;transition:transform .15s;width:16px;text-align:center}
    .pbtn{width:100%;padding:16px;color:#fff;border:none;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:block;box-shadow:0 10px 15px -5px rgba(99,102,241,.4);-webkit-tap-highlight-color:rgba(0,0,0,0)}
    .pbtn:disabled{background:#cbd2e0!important;box-shadow:none;cursor:default}
    .sbtn{padding:16px;background:#eef1f6;color:var(--text-muted);border:none;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;flex:1;-webkit-tap-highlight-color:rgba(0,0,0,0)}
    .brow{display:flex;gap:10px;position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px calc(12px + env(safe-area-inset-bottom));z-index:90;box-shadow:0 -4px 12px rgba(0,0,0,.04)}
    .brow > .pbtn, .brow > .sbtn{margin-top:0}
    .brow-inner{max-width:560px;margin:0 auto;display:flex;gap:10px;width:100%}
    .pg{display:none}
    .pg.act{display:block}
    .pv-note{padding:12px 14px;background:var(--primary-light);border-radius:14px;margin-bottom:14px;font-size:14px;color:var(--primary-dark);line-height:1.7}
    .pv-blk{border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 4px 6px -1px rgba(0,0,0,.05)}
    .pv-hdr{padding:8px 12px;background:#f7f7f5;border-bottom:1px solid #f0f0f0;font-size:15px;font-weight:600;color:#444}
    .prog-wrap{background:#eef1f6;border-radius:99px;height:10px;overflow:hidden;max-width:280px;margin:0 auto 8px}
    .prog-bar{height:100%;border-radius:99px;transition:width .2s}
    .flist{padding:14px 16px;background:#f8fafc;border-radius:16px;margin-bottom:24px;border:1px solid var(--border)}
    .fitem{font-size:15px;color:var(--text);display:flex;align-items:center;gap:6px;margin-bottom:4px}
    .spin{display:inline-block;width:16px;height:16px;border:2px solid #e0e0e0;border-top-color:var(--primary);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
    @keyframes sp{to{transform:rotate(360deg)}}
    .ex-modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:400;align-items:center;justify-content:center;padding:20px}
    .ex-modal-overlay.active{display:flex}
    .ex-modal-card{background:var(--surface);border-radius:24px;padding:26px;width:100%;max-width:420px;box-shadow:0 20px 40px -8px rgba(0,0,0,.25)}
    .ex-modal-title{font-size:19px;font-weight:700;color:var(--text);margin-bottom:4px}
    .ex-modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:18px}
    .ex-modal-field{margin-bottom:14px}
    .ex-modal-field label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;font-weight:600}
    .ex-modal-input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:14px;font-size:16px;font-family:inherit;outline:none;box-sizing:border-box;transition:.15s}
    .ex-modal-input:focus{border-color:var(--primary)}
    .ex-modal-input::placeholder{color:#c3c7ce}
    .ex-modal-btns{display:flex;gap:10px;margin-top:20px}
    .ex-modal-btn{flex:1;padding:14px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
    .ex-modal-btn.cancel{background:#eef1f6;color:var(--text-muted)}
    .ex-modal-btn.save{background:var(--primary);color:#fff;box-shadow:0 6px 14px -4px rgba(99,102,241,.5)}
  </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="nav.js"></script>
</head>
<body>
<div style="display:none" id="HDR_SUB"></div>
<button style="display:none" id="B_BACK"></button>
<div style="display:none" id="HDR_TITLE"></div>
<div class="member-tabs" id="member-tabs"></div>
<div id="export-settings-row" style="display:flex;gap:8px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border)">
  <button onclick="openNicknameModal()" style="font-size:13px;font-weight:600;padding:6px 14px;border:none;border-radius:99px;background:var(--primary-light);color:var(--primary-dark);cursor:pointer;font-family:inherit">✏️ 稱呼設定</button>
  <button onclick="openAgentInfoModal()" style="font-size:13px;font-weight:600;padding:6px 14px;border:none;border-radius:99px;background:var(--primary-light);color:var(--primary-dark);cursor:pointer;font-family:inherit">⚙️ 業務員資訊</button>
</div>

<div class="pg act" id="P_SEL">
  <div class="wrap">
    <div class="sec-lbl">選擇匯出區塊
      <button id="B_TOGALL" style="font-size:13px;font-weight:600;padding:5px 14px;border:none;border-radius:99px;background:#eef1f6;color:var(--text-muted);cursor:pointer;font-family:inherit">全部取消</button>
    </div>
    <div id="BLKLIST"></div>
    <div class="fmt-section-hdr" id="FMT_HDR_png" onclick="toggleFmtSection('png')">
      <span style="flex:1">🖼️ 圖檔（PNG）</span>
      <span class="fmt-hdr-sel" id="FMT_SEL_png"></span>
      <span class="fmt-chevron" id="FMT_CHEV_png">▾</span>
    </div>
    <div class="fmt-grid" id="FMT_PNG"></div>
    <div class="fmt-section-hdr is-pdf" id="FMT_HDR_pdf" onclick="toggleFmtSection('pdf')">
      <span style="flex:1">📄 文件（PDF）</span>
      <span class="fmt-hdr-sel" id="FMT_SEL_pdf"></span>
      <span class="fmt-chevron" id="FMT_CHEV_pdf">▾</span>
    </div>
    <div class="fmt-grid" id="FMT_PDF"></div>
    <div class="brow">
      <div class="brow-inner">
        <button class="pbtn" id="B_PREV" style="background:var(--primary)">預覽區塊</button>
      </div>
    </div>
  </div>
</div>

<div class="pg" id="P_PREV">
  <div class="wrap-preview">
    <div class="pv-note" id="PV_NOTE"></div>
    <div id="PV_BLOCKS"></div>
    <div style="padding:8px 12px;background:#f7f7f5;border-radius:8px;font-size:14px;color:#aaa;margin-bottom:12px">
      💡 <span id="WM_HINT"></span>
    </div>
    <div class="brow">
      <div class="brow-inner">
        <button class="sbtn" id="B_BACK2">返回修改</button>
        <button class="pbtn" id="B_EXPORT" style="background:var(--primary);flex:2">下載圖片</button>
      </div>
    </div>
  </div>
</div>

<div class="pg" id="P_DOING">
  <div class="wrap" style="text-align:center;padding-top:40px">
    <div style="font-size:72px;margin-bottom:16px" id="EX_ICON">🖼️</div>
    <div style="font-weight:500;font-size:18px;margin-bottom:8px" id="EX_MSG">正在產生圖片…</div>
    <div style="font-size:14px;color:#999;margin-bottom:24px" id="EX_SUB"></div>
    <div class="prog-wrap"><div class="prog-bar" id="PROG" style="width:0%;background:var(--primary)"></div></div>
    <div style="font-size:19px;font-weight:500;margin-top:8px;color:var(--primary)" id="PROG_PCT">0%</div>
  </div>
</div>

<div class="pg" id="P_DONE">
  <div class="wrap" style="text-align:center;padding-top:32px">
    <div style="font-size:96px;margin-bottom:16px">✅</div>
    <div style="font-weight:500;font-size:18px;margin-bottom:8px">匯出完成！</div>
    <div style="font-size:14px;color:#999;line-height:1.8;margin-bottom:20px" id="DONE_MSG"></div>
    <div class="flist" id="DONE_FILES"></div>
    <div class="brow">
      <div class="brow-inner">
        <button class="sbtn" id="B_DONE_PREV" style="flex:1">回前一頁</button>
        <button class="pbtn" id="B_FINISH" style="background:var(--primary);flex:1;width:auto">回家庭首頁</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── 設定 ─────────────────────────────────────────────────
var   GAS="https://script.google.com/macros/s/AKfycbzML8PBPSfNIzLx9TT_MgrdQ43yFQmQJy17hLJqTieVPOYnHk6ZYunXkIAYX1653Kbgjg/exec";

// ▼ 四大匯出區塊（重新拆分）
var   BLOCKS=[
  {key:"premium_detail",   label:"保險繳費明細一覽表", icon:"📅",desc:"年繳/月均統計、月曆、保單與受益人整合表"},
  {key:"summary",          label:"保單彙總一覽表",     icon:"📊",desc:"保障覆蓋率、家庭責任、醫療階段、就醫情況"},
  {key:"policy_detail",    label:"保單明細一覽表",     icon:"📋",desc:"各項保障加總明細"},
  {key:"savings_timeline", label:"儲蓄險現金流時間軸", icon:"📈",desc:"未來15年各被保險人現金流匯整"},
];
var   FMTS=[
  {key:"png_single",  type:"png",label:"PNG 一張長圖",desc:"所有區塊合併，適合 LINE 傳送"},
  {key:"png_multiple",type:"png",label:"PNG 分張",    desc:"每個區塊各自一張"},
  {key:"pdf_merge",   type:"pdf",label:"PDF 合併",    desc:"所有區塊合併為單一 PDF"},
  {key:"pdf_pages",   type:"pdf",label:"PDF 分頁",    desc:"每個區塊各自一頁"},
];
var   CC={"壽險保障":"#4A90D9","醫療保障":"#27AE8F","意外險":"#F5A623","重大疾病險":"#9B59B6","重大傷病險":"#8E44AD","特定傷病險":"#7D3C98","儲蓄險":"#E8638A","年金險":"#C0392B","投資型保險":"#95A5A6"};

// ── 狀態 ─────────────────────────────────────────────────
var sel={premium_detail:false,summary:false,policy_detail:false,savings_timeline:false};
var fmt="png_single";
var fmtOpen="png"; // 手風琴目前展開的區塊，預設展開 PNG
var person={},policies=[],coverage={},savings=[];
var pName="",pDate="";

// ── 按鈕綁定 ─────────────────────────────────────────────
function _goFamily() {
  if (window.NBSRouter && typeof NBSRouter.navigate === "function") {
    NBSRouter.navigate("family.html");
  } else {
    window.location.href = "family.html";
  }
}

document.getElementById("B_BACK").onclick    = _goFamily;
document.getElementById("B_TOGALL").onclick  = doToggleAll;
document.getElementById("B_PREV").onclick    = doShowPreview;
document.getElementById("B_BACK2").onclick   = doShowSelect;
document.getElementById("B_EXPORT").onclick  = doExport;
document.getElementById("B_FINISH").onclick  = _goFamily;
document.getElementById("B_DONE_PREV").onclick = doShowSelect;

// ── 建立區塊清單 ──────────────────────────────────────────
function buildBlocks(){
  var c=document.getElementById("BLKLIST");
  c.innerHTML="";
  BLOCKS.forEach(function(b){
    var d=document.createElement("div");
    d.className="blk"+(sel[b.key]?" on":"");
    d.innerHTML='<div class="chk">'+(sel[b.key]?"✓":"")+'</div><span style="font-size:28px;flex-shrink:0">'+b.icon+'</span><div style="flex:1"><div class="blk-lbl">'+b.label+'</div><div class="blk-desc">'+b.desc+'</div></div>';
    d.onclick=(function(key){return function(){
      sel[key]=!sel[key];
      buildBlocks();
      updateToggleBtn();
      updatePrevBtn();
    };})(b.key);
    c.appendChild(d);
  });
}

function buildFmts(){
  ["png","pdf"].forEach(function(t){
    var c=document.getElementById("FMT_"+t.toUpperCase());
    c.innerHTML="";
    FMTS.filter(function(f){return f.type===t;}).forEach(function(f){
      var d=document.createElement("div");
      var sc=fmt===f.key?(t==="png"?"spng":"spdf"):"";
      d.className="fmt "+sc;
      d.innerHTML='<div class="fmt-title">'+f.label+'</div><div class="fmt-desc">'+f.desc+'</div>';
      d.onclick=(function(key,type){return function(){
        fmt=key;
        buildFmts();
        var eb=document.getElementById("B_EXPORT");
        eb.style.background=fmt.startsWith("pdf")?"var(--accent-pdf)":"var(--primary)";
        eb.textContent=fmt.startsWith("pdf")?"匯出 PDF":"下載圖片";
      };})(f.key,t);
      c.appendChild(d);
    });
  });
  renderFmtSections();
}

// ── PNG／PDF 手風琴收合 ──────────────────────────────────
function toggleFmtSection(type){
  fmtOpen = (fmtOpen===type) ? null : type;
  renderFmtSections();
}

function renderFmtSections(){
  ["png","pdf"].forEach(function(t){
    var isOpen = fmtOpen===t;
    document.getElementById("FMT_"+t.toUpperCase()).style.display = isOpen ? "grid" : "none";
    document.getElementById("FMT_CHEV_"+t).textContent = isOpen ? "▾" : "▸";
    var selEl = document.getElementById("FMT_SEL_"+t);
    var cur = FMTS.find(function(f){return f.key===fmt && f.type===t;});
    if(!isOpen && cur){
      selEl.textContent = cur.label;
      selEl.style.display = "inline-block";
    } else {
      selEl.style.display = "none";
    }
  });
}

function updateToggleBtn(){
  var all=BLOCKS.every(function(b){return sel[b.key];});
  document.getElementById("B_TOGALL").textContent=all?"全部取消":"全部勾選";
}

function updatePrevBtn(){
  var keys=BLOCKS.filter(function(b){return sel[b.key];});
  var btn=document.getElementById("B_PREV");
  if(keys.length===0){
    btn.textContent="請至少勾選一個區塊";
    btn.style.background="#ccc";
    btn.disabled=true;
  }else{
    btn.textContent="預覽 "+keys.length+" 個區塊";
    btn.style.background="var(--primary)";
    btn.disabled=false;
  }
}

function doToggleAll(){
  var all=BLOCKS.every(function(b){return sel[b.key];});
  BLOCKS.forEach(function(b){sel[b.key]=!all;});
  buildBlocks();
  updateToggleBtn();
  updatePrevBtn();
}

function goPage(id){
  ["P_SEL","P_PREV","P_DOING","P_DONE"].forEach(function(p){
    document.getElementById(p).className="pg"+(p===id?" act":"");
  });
}

function doShowSelect(){
  goPage("P_SEL");
  document.getElementById("HDR_TITLE").textContent="匯出圖片";
}

function doShowPreview(){
  if(document.getElementById("B_PREV").disabled) return;
  if(!policies) { alert("資料仍在載入中，請稍後再試"); return; }
  var selBlks=BLOCKS.filter(function(b){return sel[b.key];});
  var isPdf=fmt.startsWith("pdf");
  document.getElementById("HDR_TITLE").textContent="預覽確認";
  document.getElementById("PV_NOTE").innerHTML='ℹ️ 以下為<strong>真實資料預覽</strong>，點「'+(isPdf?"匯出 PDF":"下載圖片")+'」後系統產生'+(isPdf?"PDF":"PNG")+'檔案。';
  document.getElementById("WM_HINT").textContent='匯出圖片底部將自動加上「'+getWatermarkText()+'」浮水印';
  var eb=document.getElementById("B_EXPORT");
  eb.style.background=isPdf?"var(--accent-pdf)":"var(--primary)";
  eb.textContent=isPdf?"匯出 PDF":"下載圖片";
  var c=document.getElementById("PV_BLOCKS");
  c.innerHTML="";
  selBlks.forEach(function(b,i){
    if(fmt!=="png_single"){
      var tag=document.createElement("div");
      tag.style.cssText="font-size:14px;color:#bbb;margin-bottom:3px";
      tag.textContent="第 "+(i+1)+" "+(fmt.startsWith("pdf")?"頁":"張");
      c.appendChild(tag);
    }
    var div=document.createElement("div");
    div.className="pv-blk";
    div.innerHTML=getBlockTitleHtml(b)+'<div>'+renderBlock(b.key)+'</div>';
    c.appendChild(div);
  });
  goPage("P_PREV");
}

// ── 現金流時間軸輔助函式 ─────────────────────────────────
function fmtAmtEx(amt){if(amt>=10000)return(amt/10000).toFixed(1)+"萬";return amt.toLocaleString();}
function isMonthlyEx(k){return k==="5";}
function isYearlyDetailEx(k){return k==="6";}
function getEndYearAt100Ex(memberId,policy){
  var bd=(familyData&&familyData.members&&(familyData.members.find(function(m){return m.personId===memberId;})||{}).birthDate);
  if(bd){var by=parseInt(bd.slice(0,4));if(!isNaN(by))return by+100;}
  if(policy&&policy.startDate){var sy=parseInt(policy.startDate.slice(0,4));if(!isNaN(sy))return sy+80;}
  return new Date().getFullYear()+50;
}
function calcPolicyFlowsEx(p,s,memberId,years){
  var sw=p.startDate?parseInt(p.startDate.slice(0,4)):null;
  var pw=p.payEndDate?parseInt(p.payEndDate.slice(0,4)):null;
  var cw=p.covEndDate?parseInt(p.covEndDate.slice(0,4)):getEndYearAt100Ex(memberId,p);
  if(!sw)return{};
  var tk=s.type||"1",dfr=parseInt(s.duringFreqYr)||2,dsy=parseInt(s.duringStartYr)||1;
  var da=parseFloat(s.duringAmt)||0,afr=parseInt(s.afterFreqYr)||1;
  var asy=parseInt(s.afterStartYr!==undefined?s.afterStartYr:0),aa=parseFloat(s.afterAmt)||0;
  var mo=isMonthlyEx(tk),yrd=isYearlyDetailEx(tk);
  var ym={};
  if(yrd&&s.yearlyAmts){s.yearlyAmts.forEach(function(r){var y=parseInt(r.yr),a=parseFloat(r.amt);if(!isNaN(y)&&!isNaN(a)&&a>0)ym[y]=(ym[y]||0)+a;});}
  var er=(p.currency&&p.currency!=="TWD"&&parseFloat(s.exchangeRate))?parseFloat(s.exchangeRate):1;
  var flows={};
  years.forEach(function(yr){
    if(yr>cw)return;
    var fl=0,id=pw?(yr>=sw&&yr<pw):false,ia=pw?yr>=pw:yr>=sw;
    if(yrd){fl=ym[yr]||0;}
    else if(tk==="1"){if(pw&&yr===pw)fl=aa;}
    else if(tk==="2"){
      if(id&&da>0){var ft=sw+dsy-1,e=yr-ft;if(yr>=ft&&e%dfr===0)fl+=da;}
      if(pw&&yr===pw)fl+=aa;
    }else if(tk==="3"){if(ia&&aa>0){var b=(pw||sw)+asy,e2=yr-b;if(yr>=b&&e2%afr===0)fl=aa;}}
    else if(tk==="4"){
      if(id&&da>0){var ft2=sw+dsy-1,e3=yr-ft2;if(yr>=ft2&&e3%dfr===0)fl+=da;}
      if(ia&&aa>0){var b2=(pw||sw)+asy,e4=yr-b2;if(yr>=b2&&e4%afr===0)fl+=aa;}
    }else if(mo){if(ia&&aa>0)fl=aa*12;}
    if(fl>0)flows[yr]=Math.round(fl*er);
  });
  return flows;
}

// ── Summary 輔助函式（移植自 summary.html）──────────────
// 保額單位換算成「萬元」，同 summary.html 的 convertToWan
// 判斷保單目前是否仍在保障中：只有「停效」才算失去保障，
// 其餘狀態（有效/繳費期滿/自動墊繳/展期/緩繳/減額繳清）都代表保單
// 仍在繼續提供保障，都應該算進保障覆蓋率計算裡。
function isPolicyActiveEx(p) {
  return p.status !== "停效";
}

function convertToWanEx(amount, unit) {
  var n = parseFloat(amount);
  if (isNaN(n)) return null;
  var u = unit || "萬元";
  if (u === "萬元") return n;
  if (u === "元") return n / 10000;
  return null;
}

function sumCovEx(keys, policies, coverage) {
  var total = 0;
  policies.forEach(p => {
    keys.forEach(k => {
      if (p.coverage && typeof p.coverage[k] === "number") {
        total += p.coverage[k];
      }
    });
  });
  // 相容舊格式
  if (total === 0 && coverage) {
      policies.forEach(p => {
          keys.forEach(k => {
              if (coverage[p.id + "_" + k] && typeof coverage[p.id + "_" + k] === "number") {
                  total += coverage[p.id + "_" + k];
              }
          });
      });
  }
  return total;
}

// 核心運算引擎：精準抓取資料庫數字
function getItemCurrentEx(key, policies, coverage, covOverrides) {
  var map = GAP_KEY_MAP_EX[key];
  if(!map) return 0;

  var manualKey = currentPersonId+"_"+key;
  if(covOverrides && covOverrides[manualKey] !== undefined) {
    return covOverrides[manualKey] ? 1 : 0;
  }

  if(["investment","savings","waiver"].includes(key)) {
    if(key==="investment") return policies.some(p=>p.category==="投資型保險")?1:0;
    if(key==="savings")    return policies.some(p=>["儲蓄險","年金險"].includes(p.category))?1:0;
    if(key==="waiver")     return sumCovEx(["ltc_waiver"], policies, coverage) > 0 ? 1 : 0;
    return 0;
  }

  if (["life_permanent", "life_term"].includes(key)) {
      let amt = 0;
      var matchedPolicies = policies.filter(p => map.cats.includes(p.category));
      matchedPolicies.forEach(p => {
         var w = convertToWanEx(p.insuredAmount, p.insuredAmountUnit);
         if (w !== null) amt += w;
      });
      if (amt === 0 && matchedPolicies.length > 0) return 1; 
      return amt;
  }

  if (key === "ci_special") {
      var matchedPolicies = policies.filter(p => map.cats.includes(p.category));
      var amt = sumCovEx(["ci_major_lump","ci_catastrophic_lump","ci_specific_lump"], matchedPolicies, coverage);
      if (amt === 0) {
        matchedPolicies.forEach(p => {
           var w = convertToWanEx(p.insuredAmount, p.insuredAmountUnit);
           if (w !== null) amt += w;
        });
      }
      if (amt === 0 && matchedPolicies.length > 0) return 1; 
      return amt;
  }

  var NO_FALLBACK_KEYS = [
    "acc_medical","acc_hosp","hosp_real_room","hosp_daily",
    "surgery","cancer_hosp","cancer_surgery","ltc_disable","ltc_support",
    "ltc_care","cancer_death_hospice"
  ];
  if (NO_FALLBACK_KEYS.indexOf(key) !== -1) {
    return sumCovEx(map.keys, policies, coverage);
  }

  var amt = sumCovEx(map.keys, policies, coverage);

  var matchedPolicies = policies.filter(p => map.cats.includes(p.category));
  if (amt === 0 && matchedPolicies.length > 0) {
      matchedPolicies.forEach(p => {
          var w = convertToWanEx(p.insuredAmount, p.insuredAmountUnit);
          if (w !== null) amt += w;
      });
      if (amt === 0) return 1; 
  }

  return amt;
}

function getItemStatusEx(key, policies, coverage, targets, covOverrides) {
  var item = GAP_GROUPS_EX.flatMap(g=>g.items).find(i=>i.key===key);
  var current = getItemCurrentEx(key, policies, coverage, covOverrides);
  var target  = targets[key];
  var isBool  = item?.isBool;
  if(!current) return {status:"gap", current:0, target, pct:0};
  if(!target||isBool) return {status:"ok", current, target:null, pct:1};
  if(current>=target) return {status:"ok", current, target, pct:1};
  return {status:"insufficient", current, target, pct:current/target};
}

function getInsAge(pid) {
  var p=personDataMap[pid];
  if(!p) return null;
  var b=new Date(p.profile.birthDate), a=new Date(p.profile.analysisDate||new Date());
  var y=a.getFullYear()-b.getFullYear();
  var mo=(a-new Date(b.getFullYear()+y,b.getMonth(),b.getDate()))/(1000*60*60*24*30.4375);
  if(mo>=6)y++;
  return y;
}

// 判斷保單是「終身」還是「定期」：保障截止日（covEndDate/covEndRaw）
// 沒填 = 終身，有填 = 定期。isTerm 傳 true 找定期的、false 找終身的。
function lifeAmountEx(pols, cats, isTerm) {
  var amt = 0;
  pols.forEach(function(p){
    if (cats.indexOf(p.category) === -1) return;
    var hasEnd = !!(p.covEndDate || p.covEndRaw);
    if (isTerm !== hasEnd) return;
    var w = convertToWanEx(p.insuredAmount, p.insuredAmountUnit);
    if (w !== null) amt += w;
  });
  return amt;
}
// 定期保單的「保障剩餘年期」：以分析日為基準，抓同一組類別裡最快到期
// 的那張保單（最需要留意續保/續買的那一張）
function lifeRemainYearsEx(pols, cats) {
  var minYears = null;
  var base = (person.profile && person.profile.analysisDate) ? new Date(person.profile.analysisDate) : new Date();
  pols.forEach(function(p){
    if (cats.indexOf(p.category) === -1) return;
    var endRaw = p.covEndDate || p.covEndRaw;
    if (!endRaw) return;
    var end = new Date(endRaw);
    if (isNaN(end)) return;
    var yrs = Math.max(0, Math.round((end - base) / (365.25*24*3600*1000)));
    if (minYears === null || yrs < minYears) minYears = yrs;
  });
  return minYears;
}

// ── Phase 0：共用視覺元件（大數字 Stat 卡片）──────────────
// 設計原則（跟使用者確認過，並依實測回饋修正兩次）：
// - 底色維持各分類原本的語意色（辨識度優先）。
// - 【核心原則】每個保障項目都要獨立成一行，不能合併/隱藏——
//   這份報告的核心用途是業務員跟保戶逐項討論保障缺口，「每一項都
//   能被單獨指出來」比「版面精簡」更重要。
// - 有規劃的項目：大數字、彩色，一眼看出金額。
// - 沒規劃的項目：不用死板的「—」，改用淡灰色圓角「缺口」標籤，
//   用現代 App 常見的狀態標籤語言，取代 Excel 式的破折號。
function buildStatGroupCard(g, policies, cov3) {
  var itemsData = g.items.map(function(item){
    var total, isRange=false, minVal=0, maxVal=0, remainNote="";
    if (item.compute) {
      total = item.compute(policies);
      if (item.remain) {
        var ry = item.remain(policies);
        if (ry !== null) remainNote = ' (剩 '+ry+' 年)';
      }
    } else {
      var maxKey = item.keys && item.keys.find(function(k){ return k.endsWith('_max'); });
      var minKey = maxKey ? maxKey.replace('_max','_min') : null;
      minVal = minKey ? sumCovEx([minKey],policies,cov3) : 0;
      maxVal = maxKey ? sumCovEx([maxKey],policies,cov3) : 0;
      isRange = !!(maxKey && (minVal>0 || maxVal>0));
      total = isRange ? maxVal : sumCovEx(item.keys,policies,cov3);
    }
    return { label:item.label, unit:item.unit, total:total, isRange:isRange, minVal:minVal, maxVal:maxVal, remainNote:remainNote };
  });

  // 有規劃的排前面方便先看重點，沒規劃的排後面方便接續討論缺口，
  // 但兩者都是「獨立一行」，資料不刪減、不合併
  var filled = itemsData.filter(function(x){ return x.total>0; });
  var empty  = itemsData.filter(function(x){ return !(x.total>0); });
  var rowsHtml = filled.map(function(x){ return statRowHtml(x, g.color); }).join("")
               + empty.map(function(x){ return statRowHtml(x, g.color); }).join("");

  return '<div style="background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 14px -4px rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.04)">'+
    '<div style="display:flex;align-items:center;gap:8px;padding:12px 14px;background:linear-gradient(135deg,'+g.color+'26,'+g.color+'0A)">'+
      '<span style="font-size:20px;line-height:1">'+(g.icon||'')+'</span>'+
      '<span style="font-size:14px;font-weight:800;letter-spacing:.01em;color:'+g.color+'">'+g.label+'</span>'+
    '</div>'+
    rowsHtml +
  '</div>';
}
function statRowHtml(x, color) {
  var isFilled = x.total > 0;
  var valueHtml;
  if (!isFilled) {
    valueHtml = '<span style="font-size:11px;font-weight:800;color:#9aa0ac;background:#eef0f3;padding:3px 10px;border-radius:99px;white-space:nowrap">缺口</span>';
  } else if (x.isRange) {
    valueHtml = '<span style="font-size:15px;font-weight:800;color:'+color+';font-variant-numeric:tabular-nums">'+
      x.minVal.toLocaleString()+'<span style="color:#c7c9d1;margin:0 1px;font-weight:400">～</span>'+x.maxVal.toLocaleString()+
      '<span style="font-size:11px;color:#9aa0ac;font-weight:700;margin-left:2px">'+x.unit+'</span></span>';
  } else {
    valueHtml = '<span style="font-size:16px;font-weight:800;color:'+color+';font-variant-numeric:tabular-nums">'+x.total.toLocaleString()+
      '<span style="font-size:11px;color:#9aa0ac;font-weight:700;margin-left:2px">'+x.unit+'</span></span>';
  }
  return '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:2px 6px;padding:'+(isFilled?'9px':'8px')+' 12px;border-top:1px solid #f2f2f4">'+
    '<span style="font-size:11.5px;color:'+(isFilled?"#555":"#aaacb3")+';font-weight:700">'+x.label+(isFilled?x.remainNote:"")+'</span>'+
    valueHtml+
  '</div>';
}

// ── SVG 箭頭列（html2canvas 相容，不使用 clip-path+calc）────────────────
function buildSvgArrows(phases) {
  var W=600, H=40, tip=14;
  var weights=[1,1.4,1], totalW=3.4;
  var widths=weights.map(function(w){return w/totalW*W;});
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block;margin-bottom:16px">';
  var x=0;
  phases.forEach(function(ph,i){
    var w=widths[i], x0=x, x1=x+w, pts;
    if(i===0){
      pts=x0+',0 '+(x1-tip)+',0 '+x1+','+(H/2)+' '+(x1-tip)+','+H+' '+x0+','+H;
    } else if(i===2){
      pts=x0+',0 '+x1+',0 '+x1+','+H+' '+x0+','+H+' '+(x0+tip)+','+(H/2);
    } else {
      pts=x0+',0 '+(x1-tip)+',0 '+x1+','+(H/2)+' '+(x1-tip)+','+H+' '+x0+','+H+' '+(x0+tip)+','+(H/2);
    }
    svg+='<polygon points="'+pts+'" fill="'+ph.color+'"/>';
    var tx=i===0?x0+(w-tip)/2:i===2?x0+tip+(w-tip)/2:x0+tip+(w-tip*2)/2;
    svg+='<text x="'+tx+'" y="'+(H/2+5)+'" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,sans-serif">'+ph.label+'</text>';
    x+=w;
  });
  svg+='</svg>';
  return svg;
}

function buildDonutChartEx(active, coverage, targets, covOverrides) {
  var allItems = GAP_GROUPS_EX.flatMap(g=>g.items);
  var n = allItems.length;
  
  var cx=300, cy=210, OR=135, IR=72;
  var gapA=0.03, sliceA=(Math.PI*2-n*gapA)/n;

  var angle=-Math.PI/2;
  var paths="";
  var labels=""; 

  function renderLegend(g) {
    var legendHtml = `<div style="font-size:18px;font-weight:800;color:${g.color};margin-bottom:10px;border-bottom:2px solid ${g.color}30;padding-bottom:6px">${g.label}</div>`;
    
    g.items.forEach(item => {
      var {status, pct, current, target} = getItemStatusEx(item.key, active, coverage, targets, covOverrides);
      var icon = status==="gap"?"❌":status==="insufficient"?"⚠️":"✅";
      var dotColor = status==="gap"?"#e0e0e0":item.color;

      var amtHtml = "";
      if (item.isBool) {
        amtHtml = current > 0 ? `<span style="color:#555;font-size:16px;font-weight:700">有</span>` : `<span style="color:#bbb;font-size:16px;font-weight:700">無</span>`;
      } else {
        if (current > 0 || target > 0) {
          var displayVal = current > 0 ? current.toLocaleString() : "0";
          if (target > 0) displayVal += ` / ${target.toLocaleString()}`;
          
          amtHtml = `<span style="color:${current>0?'#0C447C':'#888'};font-weight:800;font-size:19px;font-variant-numeric:tabular-nums">${displayVal}<span style="font-size:13px;color:#888;margin-left:3px;font-weight:600">${item.unit}</span></span>`;
        } else {
          amtHtml = `<span style="color:#bbb;font-size:16px;font-weight:700">0</span>`;
        }
      }

      legendHtml += `<div style="display:flex;align-items:center;gap:8px;font-size:15px;margin-bottom:8px">
        <div style="width:11px;height:11px;border-radius:3px;background:${dotColor};flex-shrink:0"></div>
        <span style="color:${status==="gap"?"#bbb":"#444"};font-weight:700;flex:1;white-space:nowrap">${item.label}</span>
        ${amtHtml}
        <span style="margin-left:4px;font-size:14px">${icon}</span>
      </div>`;
    });
    return legendHtml;
  }

  var legendFamily = renderLegend(GAP_GROUPS_EX[0]);
  var legendBefore = renderLegend(GAP_GROUPS_EX[1]);
  var legendDuring = renderLegend(GAP_GROUPS_EX[2]);
  var legendAfter  = renderLegend(GAP_GROUPS_EX[3]);

  allItems.forEach(item => {
    var {status,pct} = getItemStatusEx(item.key, active, coverage, targets, covOverrides);
    var start = angle+gapA/2;
    var end   = angle+gapA/2+sliceA;
    var filledEnd = start + sliceA*pct;
    var midA  = start + sliceA/2; 
    angle += sliceA+gapA;

    var px=(r,a)=>cx+r*Math.cos(a), py=(r,a)=>cy+r*Math.sin(a);
    var donut=(a1,a2,lg,r1,r2)=>`M${px(r1,a1)},${py(r1,a1)} A${r1},${r1} 0 ${lg} 1 ${px(r1,a2)},${py(r1,a2)} L${px(r2,a2)},${py(r2,a2)} A${r2},${r2} 0 ${lg} 0 ${px(r2,a1)},${py(r2,a1)} Z`;

    paths += `<path d="${donut(start,end,sliceA>Math.PI?1:0,OR,IR)}" fill="#f0f0f0"/>`;
    if(pct>0.01) paths += `<path d="${donut(start,filledEnd,sliceA*pct>Math.PI?1:0,OR,IR)}" fill="${item.color}"/>`;
    if(status==="insufficient" && pct<0.99) {
      var gapSize=sliceA*(1-pct);
      paths += `<path d="${donut(filledEnd,end,gapSize>Math.PI?1:0,OR,IR)}" fill="none" stroke="${item.color}" stroke-width="2.5" stroke-dasharray="4 3" opacity="0.45"/>`;
    }

    var isRight = Math.cos(midA) >= 0; 
    var x0 = px(OR, midA), y0 = py(OR, midA); 
    var x1 = px(OR + 14, midA), y1 = py(OR + 14, midA); 
    var x2 = x1 + (isRight ? 18 : -18), y2 = y1; 

    var textAnchor = isRight ? "start" : "end";
    var textX = x2 + (isRight ? 4 : -4);
    var textColor = status === "gap" ? "#aaa" : "#555";
    var fw = status === "ok" ? "500" : "400";
    var prefix = status === "gap" ? "❌ " : status === "insufficient" ? "⚠️ " : "";

    labels += `
      <polyline points="${x0},${y0} ${x1},${y1} ${x2},${y2}" fill="none" stroke="${item.color}60" stroke-width="1.2"/>
      <circle cx="${x0}" cy="${y0}" r="2" fill="${item.color}"/>
      <text x="${textX}" y="${y2+4}" text-anchor="${textAnchor}" style="font-size:14px;fill:${textColor};font-weight:${fw};letter-spacing:0.03em">${prefix}${item.label}</text>
    `;
  });

  var okN = allItems.filter(item=>getItemStatusEx(item.key,active,coverage,targets,covOverrides).status==="ok").length;
  var gapN = allItems.filter(item=>getItemStatusEx(item.key,active,coverage,targets,covOverrides).status==="gap").length;
  var insN = allItems.filter(item=>getItemStatusEx(item.key,active,coverage,targets,covOverrides).status==="insufficient").length;

  return `<div style="display:flex;flex-direction:column;width:100%">
    <div style="display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:24px;padding:0">
      <svg viewBox="0 0 600 420" style="width:100%; max-width:660px; flex-shrink:0;">
        ${paths}
        ${labels}
        <text x="${cx}" y="${cy-14}" text-anchor="middle" style="font-size:14px;fill:#888">✅ 達標</text>
        <text x="${cx}" y="${cy+4}"  text-anchor="middle" style="font-size:19px;font-weight:bold;fill:#333">${okN}</text>
        <text x="${cx}" y="${cy+20}" text-anchor="middle" style="font-size:14px;fill:#E74C3C">❌ 缺口 ${gapN}</text>
        <text x="${cx}" y="${cy+34}" text-anchor="middle" style="font-size:14px;fill:#F5A623">⚠ 不足 ${insN}</text>
      </svg>
      <div style="min-width:180px;background:#fafbfc;padding:16px 18px;border-radius:16px;border:1px solid rgba(0,0,0,.04);box-shadow:0 3px 10px -4px rgba(0,0,0,.06)">
        ${legendFamily}
      </div>
    </div>
    
    <div style="border-top:1px dashed #e8e8e8;padding-top:22px">
      ${buildSvgArrows([
        {label:GAP_GROUPS_EX[1].arrowLabel, color:"#4CAF86"},
        {label:GAP_GROUPS_EX[2].arrowLabel, color:"#378ADD"},
        {label:GAP_GROUPS_EX[3].arrowLabel, color:"#E87BAD"}
      ])}
      <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:14px;margin-top:14px">
        <div style="background:#fafbfc;padding:14px 16px;border-radius:14px;border:1px solid rgba(0,0,0,.04)">${legendBefore}</div>
        <div style="background:#fafbfc;padding:14px 16px;border-radius:14px;border:1px solid rgba(0,0,0,.04)">${legendDuring}</div>
        <div style="background:#fafbfc;padding:14px 16px;border-radius:14px;border:1px solid rgba(0,0,0,.04)">${legendAfter}</div>
      </div>
    </div>
  </div>`;
}

// ── 缺口／不足分析 ────────────────────────────────────────
function buildGapAnalysisEx(active, coverage, targets, covOverrides) {
  var allItems = GAP_GROUPS_EX.flatMap(g=>g.items);
  var gaps = [], insufficients = [];
  allItems.forEach(item => {
    var s = getItemStatusEx(item.key, active, coverage, targets, covOverrides);
    if(s.status==="gap") gaps.push({item, ...s});
    if(s.status==="insufficient") insufficients.push({item, ...s});
  });

  var html = "";

  if(insufficients.length) {
    html += `<div style="font-size:17px;font-weight:500;color:#F5A623;margin-bottom:8px">⚠ 規劃不足</div>`;
    insufficients.forEach(({item,current,target,pct}) => {
      html += `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:16px;color:#555">${item.label}</span>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:17px;color:#555;font-weight:500">${current.toLocaleString()}${item.unit}</span>
            <span style="font-size:14px;color:#aaa">/ 目標 ${target?.toLocaleString()}${item.unit}</span>
          </div>
        </div>
        <div style="height:7px;background:#f0f0f0;border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${Math.round(pct*100)}%;background:${item.color};border-radius:99px"></div>
        </div>
        <div style="font-size:14px;color:#E74C3C;margin-top:3px">尚不足 ${(target-current).toLocaleString()}${item.unit}（${Math.round(pct*100)}% 達成）</div>
      </div>`;
    });
  }

  if(gaps.length) {
    html += `<div style="font-size:17px;font-weight:500;color:#E74C3C;margin-bottom:8px;margin-top:${insufficients.length?12:0}px">❌ 尚未規劃</div>`;
    html += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">`;
    gaps.forEach(({item}) => {
      html += `<span style="padding:3px 10px;background:#FCEBEB;border:1px solid #F0A8BF;border-radius:99px;font-size:14px;color:#791F1F">${item.label}</span>`;
    });
    html += `</div><div style="font-size:14px;color:#aaa">💡 可與保戶討論是否有需要規劃</div>`;
  }

  if(!insufficients.length && !gaps.length) {
    html += `<div style="font-size:17px;color:#27AE8F;text-align:center;padding:12px 0">🎉 所有已設目標項目均達標！</div>`;
  }

  return html;
}

    html+='<div style="background:#f7f8fa;border-radius:20px;padding:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px">';
    visitCats.forEach(function(vc, ci){
      var ck = ["disease","accident","cancer"][ci];
      var opdVal="—", opdUnit="", opdIsInsurance=false;
      if(ck==="disease"){ opdIsInsurance=true; }
      else if(ck==="accident"){ opdVal=sumCovEx(["acc_opd"],policies,cov)||"—"; opdUnit="萬/次"; }
      else { opdVal=sumCovEx(["can_opd"],policies,cov)||"—"; opdUnit="元/次"; }

      var hospVal="—", hospUnit="元/日";
      if(ck==="disease") hospVal=baseHosp||"—";
      else if(ck==="accident") hospVal=(baseHosp+sumCovEx(["acc_hosp"],policies,cov))||"—";
      else hospVal=(baseHosp+sumCovEx(["can_hosp","can_discharge"],policies,cov))||"—";

      html+='<div style="background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 3px 10px -3px rgba(0,0,0,.12)">'+
        '<div style="padding:12px 14px;background:linear-gradient(135deg,'+vc.color+'26,'+vc.color+'0A);text-align:center">'+
          '<span style="font-size:16px;font-weight:800;color:'+vc.color+'">'+vc.label+'</span>'+
        '</div>'+
        '<div style="padding:14px 16px;border-top:1px solid #f2f2f4;min-height:66px;display:flex;flex-direction:column;justify-content:center">'+
          '<div style="font-size:12px;color:#9aa0ac;font-weight:700;margin-bottom:4px">門診</div>'+
          (opdIsInsurance
            ? '<div style="display:inline-flex;padding:6px 14px;border-radius:9px;background:#EAF3DE"><span style="font-size:18px;font-weight:800;color:#27500A">健保</span></div>'
            : '<div style="font-size:26px;font-weight:800;color:'+(opdVal!=="—"?"#1a1a1a":"#c7cad2")+';font-variant-numeric:tabular-nums">'+(typeof opdVal==="number"?opdVal.toLocaleString():opdVal)+(opdVal!=="—"?'<span style="font-size:13px;color:#9aa0ac;font-weight:700;margin-left:2px">'+opdUnit+'</span>':'')+'</div>')+
        '</div>'+
        '<div style="padding:14px 16px;border-top:1px solid #f2f2f4">'+
          '<div style="font-size:12px;color:#9aa0ac;font-weight:700;margin-bottom:4px">住院</div>'+
          '<div style="font-size:26px;font-weight:800;color:'+(hospVal!=="—"?"#1a1a1a":"#c7cad2")+';font-variant-numeric:tabular-nums">'+(typeof hospVal==="number"?hospVal.toLocaleString():hospVal)+(hospVal!=="—"?'<span style="font-size:13px;color:#9aa0ac;font-weight:700;margin-left:2px">'+hospUnit+'</span>':'')+'</div>'+
          (hospVal!=="—" ? '<div style="font-size:11px;color:#c7cad2;margin-top:2px">自動加總</div>' : '')+
        '</div>'+
      '</div>';
    });
    html+='</div>';
    html+='<div style="font-size:12px;color:#b7bac2;padding:2px 4px">💡 疾病住院＝實支病房＋日額病房＋日額出院療養　　💡 意外住院＝疾病住院＋意外日額</div>';
    html+='</div>';
    return html;
  }

  // ▼ ③保單明細一覽表：原「各項保障加總」完全不動，只改外層區塊名稱
  if(key==="policy_detail"){
    var cov3={};
    policies.forEach(function(p){
      Object.entries(p.coverage||{}).forEach(function(e){
        if(typeof e[1]==="number") cov3[e[0]]=(cov3[e[0]]||0)+e[1]; else cov3[e[0]]=e[1];
      });
    });
    var html='<div style="padding:14px 12px">';
    html+='<div style="font-size:15px;font-weight:800;color:#444;margin-bottom:12px">各項保障加總</div>';
    // 五欄，依指定分組（不是自動順排，是手動指定哪幾類放同一欄）
    var columnMap = [
      ["壽險/重大保障(終身/定期)", "意外險"],
      ["住院醫療 (實支實付)"],
      ["日額型住院"],
      ["定額手術", "失能長照"],
      ["癌症醫療"],
    ];
    html+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:start">';
    columnMap.forEach(function(labels){
      html+='<div style="display:flex;flex-direction:column;gap:12px">';
      labels.forEach(function(label){
        var g = COVERAGE_GROUPS_EX.find(function(x){ return x.label===label; });
        if (g) html += buildStatGroupCard(g, policies, cov3);
      });
      html+='</div>';
    });
    html+='</div></div>';
    return html;
  }


  if(key==="savings_timeline"){
    var now2 = new Date().getFullYear();
    var pdm2 = {};
    var fmem2 = (familyData && familyData.members) || [];
    fmem2.filter(function(m){ return m.role!=="beneficiary_only"; }).forEach(function(m){
      var cached = sessionStorage.getItem("nbs_person_"+m.personId);
      if(cached) pdm2[m.personId]=JSON.parse(cached);
    });
    return renderSavingsTimeline(pdm2, familyData, now2, now2+14);
  }

  return'<div style="padding:12px;color:#aaa;font-size:14px">建置中</div>';
}

// ── 匯出主流程 ────────────────────────────────────────────
function doExport(){
  var selBlks=BLOCKS.filter(function(b){return sel[b.key];});
  var isPdf=fmt.startsWith("pdf");
  goPage("P_DOING");
  document.getElementById("EX_ICON").textContent=isPdf?"📄":"🖼️";
  document.getElementById("EX_MSG").textContent=isPdf?"正在產生 PDF…":fmt==="png_single"?"正在合併圖片…":"正在產生圖片…";
  document.getElementById("EX_SUB").textContent="共 "+selBlks.length+" 個區塊 "+(fmt==="png_single"?"一張 PNG":fmt==="png_multiple"?selBlks.length+"張 PNG":fmt==="pdf_merge"?"單一 PDF":selBlks.length+" 頁 PDF");
  document.getElementById("PROG").style.background=isPdf?"var(--accent-pdf)":"var(--primary)";
  document.getElementById("PROG_PCT").style.color=isPdf?"var(--accent-pdf)":"var(--primary)";

  var div=document.createElement("div");
  div.style.cssText="position:fixed;left:-9999px;top:0;width:1200px;background:#fff;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a";
  document.body.appendChild(div);

  var p=(isPdf?doExportPDF(selBlks,div):doExportPNG(selBlks,div));
  p.then(function(){
    document.body.removeChild(div);
    showDone(selBlks);
  }).catch(function(e){
    document.body.removeChild(div);
    alert("匯出失敗："+e.message);
    doShowSelect();
  });
}

function setP(v){
  document.getElementById("PROG").style.width=v+"%";
  document.getElementById("PROG_PCT").textContent=v+"%";
}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

async function doExportPNG(blks,div){
  var wm='<div style="padding:8px;background:#f7f7f5;text-align:center;font-size:14px;color:#aaa">'+getWatermarkText()+'</div>';
  var disclaimer='<div style="padding:8px 14px;font-size:16px;color:#999;line-height:1.6;text-align:left">⚠️ 本報告彙總之資訊，旨在作為檢視與討論保障內容的參考藍圖；為守護您的權益，實際理賠給付項目與條件，仍須以各家保險公司之最新資料及正式保險契約條款為準。</div>';
  if(fmt==="png_single"){
    div.style.width="1200px";
    div.innerHTML=blks.map(function(b){return'<div style="border-bottom:1px solid #f0f0f0">'+getBlockTitleHtml(b)+renderBlock(b.key)+'</div>';}).join("")+disclaimer+wm;
    setP(30);await sleep(400);
    var singleW=Math.max(div.scrollWidth,div.offsetWidth,800);
    div.style.width=singleW+"px";
    await sleep(100);
    var c=await html2canvas(div,{scale:2,useCORS:true,backgroundColor:"#ffffff",
      width:singleW,windowWidth:singleW});
    div.style.width="1200px";
    setP(80);await sleep(100);
    var a=document.createElement("a");
    a.download=pName+"_保單體檢_"+pDate+".png";
    a.href=c.toDataURL("image/png");a.click();
    setP(100);
  }else{
    for(var i=0;i<blks.length;i++){
      div.style.width="1200px";
      div.innerHTML=getBlockTitleHtml(blks[i])+renderBlock(blks[i].key)+disclaimer+wm;
      setP(Math.round(i/blks.length*90));await sleep(300);
      var actualW=Math.max(div.scrollWidth,div.offsetWidth,800);
      div.style.width=actualW+"px";
      await sleep(100);
      var c2=await html2canvas(div,{scale:2,useCORS:true,backgroundColor:"#ffffff",
        width:actualW,windowWidth:actualW});
      div.style.width="1200px";
      var a2=document.createElement("a");
      a2.download=pName+"_"+blks[i].label+"_"+pDate+".png";
      a2.href=c2.toDataURL("image/png");a2.click();
      await sleep(400);
    }
    setP(100);
  }
}

async function doExportPDF(blks,div){
  var J=window.jspdf.jsPDF;
  var pdf=new J("l","mm","a4");  // 預設橫向，更適合寬表格
  var wm='<div style="padding:8px;background:#f7f7f5;text-align:center;font-size:14px;color:#aaa">'+getWatermarkText()+'</div>';
  var disclaimer='<div style="padding:8px 14px;font-size:16px;color:#999;line-height:1.6;text-align:left">⚠️ 本報告彙總之資訊，旨在作為檢視與討論保障內容的參考藍圖；為守護您的權益，實際理賠給付項目與條件，仍須以各家保險公司之最新資料及正式保險契約條款為準。</div>';
  for(var i=0;i<blks.length;i++){
    var showDisclaimer = fmt==="pdf_pages" ? true : (i===blks.length-1);
    div.style.width="1200px";
    div.innerHTML=getBlockTitleHtml(blks[i])+renderBlock(blks[i].key)+(showDisclaimer?disclaimer:"")+wm;
    setP(Math.round(i/blks.length*90));await sleep(300);
    var actualW3=Math.max(div.scrollWidth,div.offsetWidth,800);
    div.style.width=actualW3+"px";
    await sleep(100);
    var c=await html2canvas(div,{scale:2,useCORS:true,backgroundColor:"#ffffff",
      width:actualW3,windowWidth:actualW3});
    div.style.width="1200px";
    if(i>0) pdf.addPage("a4","landscape");
    var iw=277, ih=(c.height/c.width)*iw;
    if(ih>190){ iw=iw*(190/ih); ih=190; } // 內容太高時等比例縮小，避免寬高比例被拉伸變形
    pdf.addImage(c.toDataURL("image/png"),"PNG",10,10,iw,ih);
  }
  setP(95);
  pdf.save(pName+"_保單體檢_"+pDate+".pdf");
  setP(100);
}

function showDone(blks){
  var isPdf=fmt.startsWith("pdf");
  document.getElementById("DONE_MSG").textContent=(isPdf?"PDF":"圖片")+"已下載到您的裝置，可直接傳送給保戶";
  var h='<div style="font-size:14px;color:#aaa;margin-bottom:6px">下載的檔案</div>';
  if(fmt==="png_single")h+='<div class="fitem">🖼️ '+pName+'_保單體檢_'+pDate+'.png</div>';
  else if(fmt==="png_multiple")h+=blks.map(function(b){return'<div class="fitem">🖼️ '+pName+'_'+b.label+'_'+pDate+'.png</div>';}).join("");
  else h+='<div class="fitem">📄 '+pName+'_保單體檢_'+pDate+'.pdf'+(fmt==="pdf_pages"?" ("+blks.length+"頁)":"")+'</div>';
  document.getElementById("DONE_FILES").innerHTML=h;
  goPage("P_DONE");
}

// ── GAS 呼叫 ─────────────────────────────────────────────
function gas(action,params){
  if(action==="saveFile"){
    return fetch(GAS,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify(Object.assign({action:action},params)),
    }).then(function(r){return r.json();});
  }
  var url=new URL(GAS);
  url.searchParams.set("action",action);
  Object.entries(params||{}).forEach(function(kv){
    var k=kv[0],v=kv[1];
    if(typeof v==="object")url.searchParams.set(k,encodeURIComponent(JSON.stringify(v)));
    else if(v!==null&&v!==undefined)url.searchParams.set(k,v);
  });
  return fetch(url.toString()).then(function(r){return r.json();});
}

// ── 頁面載入後 ─────────────────────────────────────────
window.addEventListener("nbs_nav_ready", async function(e) {
  currentUser       = e.detail.user;
  familyData        = e.detail.familyData;
  currentPersonId   = e.detail.currentPersonId;
  familyFileName    = e.detail.familyFileName;

  // 從 URL ?from= 參數預選對應區塊
  var fromPage = new URLSearchParams(window.location.search).get("from") || "";
  var PAGE_TO_BLOCK = {
    "summary":     ["summary"],
    "savings":     ["savings_timeline"],
    "beneficiary": ["premium_detail"],
    "family":      ["summary"],
    "policy":      ["premium_detail","policy_detail"],
    "coverage":    ["summary"],
  };
  if (fromPage && PAGE_TO_BLOCK[fromPage]) {
    PAGE_TO_BLOCK[fromPage].forEach(function(k){ sel[k]=true; });
  }
  buildBlocks();
  buildFmts();
  var btn=document.getElementById("B_PREV");
  if(btn){btn.disabled=true;btn.textContent="資料載入中…";btn.style.background="#ccc";}

  try {
    var pdm = {};
    var fmem = (familyData && familyData.members) || [];
    var activeMembers = fmem.filter(function(m) { return m.role !== "beneficiary_only"; });

    var fetchPromises = activeMembers.map(function(mem) {
      var cacheKey = "nbs_person_" + mem.personId;
      var cachedData = sessionStorage.getItem(cacheKey);

      if (cachedData) {
        pdm[mem.personId] = JSON.parse(cachedData);
        return Promise.resolve();
      } else {
        return gas("readFile", {
          email: currentUser.email,
          fileType: "persons",
          fileName: mem.name + "_" + mem.personId + ".json"
        }).then(function(pr) {
          if (pr.status === "ok") {
            pdm[mem.personId] = pr.content;
            sessionStorage.setItem(cacheKey, JSON.stringify(pr.content));
          }
        }).catch(function(err) { console.error("讀取 " + mem.name + " 失敗", err); });
      }
    });

    await Promise.all(fetchPromises);

    personDataMap = pdm;
    person = pdm[currentPersonId] || {};
    policies = person.policies || [];
    coverage = person.coverage || {};
    savings = person.savings || [];
    pName = (person.profile && person.profile.name) || "—";
    var ad = person.profile && person.profile.analysisDate;
    if (ad) {
      var d = new Date(ad);
      pDate = (d.getFullYear() - 1911) + "年" + (d.getMonth() + 1) + "月" + d.getDate() + "日";
    }
  } catch (ex) { 
    console.error("export load error", ex); 
  }

  // SPA 底下，await 期間使用者可能已經切到別頁，DOM 已經被替換掉
  if (window.NBSRouter && !NBSRouter.isActive("export.html")) return;

  renderTabs();
  updatePrevBtn();

  // 通知 nav.js 更新側邊欄（nav.js 自己讀 Drive 可能失敗）
  if (familyData) {
    window.dispatchEvent(new CustomEvent("nbs_page_data_ready", {
      detail: { familyData: familyData, currentPersonId: currentPersonId }
    }));
  }
});

}
